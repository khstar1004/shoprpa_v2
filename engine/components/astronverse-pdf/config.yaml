atomic:
  PDF.get_pages_num:
    title: PDF 페이지 수 가져오기
    comment: PDF 파일의 전체 페이지 수를 확인하고 결과를 저장합니다.
    icon: pdf-get-page-count
    helpManual: PDF 파일 경로와 비밀번호를 지정해 문서의 페이지 수를 가져옵니다.
    inputList:
      - key: file_path
        title: PDF 파일 경로
        tip: 페이지 수를 확인할 PDF 파일을 선택합니다.
      - key: password
        title: PDF 비밀번호
        tip: 암호화된 PDF인 경우 비밀번호를 입력합니다. 비밀번호가 없으면 비워 둡니다.
    outputList:
      - key: pdf_pages_num
        title: 페이지 수
        tip: PDF 문서의 전체 페이지 수를 저장합니다.
  PDF.get_pdf_text:
    title: PDF 텍스트 추출
    comment: PDF 문서의 텍스트를 추출하고 필요하면 Word 또는 텍스트 파일로 저장합니다.
    icon: pdf-extract-text
    helpManual: 전체 페이지 또는 지정한 페이지 범위에서 텍스트를 추출합니다.
    inputList:
      - key: file_path
        title: PDF 파일 경로
        tip: 텍스트를 추출할 PDF 파일을 선택합니다.
      - key: password
        title: PDF 비밀번호
        tip: 암호화된 PDF인 경우 비밀번호를 입력합니다. 비밀번호가 없으면 비워 둡니다.
      - key: select_range
        title: 페이지 범위
        tip: 전체 페이지 또는 지정 페이지 중 추출 범위를 선택합니다.
      - key: page_range
        title: 지정 페이지
        tip: 1-3,5,7-9처럼 추출할 페이지 범위를 입력합니다.
      - key: text_save_type
        title: 저장 방식
        tip: 추출한 텍스트를 파일로 저장할지, 저장한다면 어떤 형식으로 저장할지 선택합니다.
      - key: save_dir
        title: 저장 폴더
        tip: 추출 결과 파일을 저장할 폴더를 선택합니다.
      - key: save_file_name
        title: 저장 파일명
        tip: 확장자를 제외한 저장 파일명을 입력합니다. 비워 두면 원본 파일명을 사용합니다.
      - key: exist_handle_type
        title: 같은 이름 파일 처리
        tip: 저장 위치에 같은 이름의 파일이 있을 때 처리 방식을 선택합니다.
    outputList:
      - key: pdf_text
        title: PDF 텍스트
        tip: 페이지별로 추출한 텍스트 목록을 저장합니다.
  PDF.get_pdf_images:
    title: PDF 이미지 추출
    comment: PDF 문서에서 이미지를 추출해 지정한 폴더에 저장합니다.
    icon: pdf-extract-images
    helpManual: 전체 페이지 또는 지정 페이지 범위에서 이미지를 PNG 또는 JPEG로 추출합니다.
    inputList:
      - key: file_path
        title: PDF 파일 경로
        tip: 이미지를 추출할 PDF 파일을 선택합니다.
      - key: pwd
        title: PDF 비밀번호
        tip: 암호화된 PDF인 경우 비밀번호를 입력합니다. 비밀번호가 없으면 비워 둡니다.
      - key: select_range
        title: 페이지 범위
        tip: 전체 페이지 또는 지정 페이지 중 추출 범위를 선택합니다.
      - key: page_range
        title: 지정 페이지
        tip: 1-3,5,7-9처럼 이미지를 추출할 페이지 범위를 입력합니다.
      - key: image_type
        title: 이미지 형식
        tip: 추출 이미지를 PNG 또는 JPEG 중 어떤 형식으로 저장할지 선택합니다.
      - key: save_dir
        title: 저장 폴더
        tip: 추출한 이미지 파일을 저장할 폴더를 선택합니다.
      - key: prefix
        title: 이미지 파일 접두사
        tip: 저장할 이미지 파일명 앞에 붙일 접두사를 입력합니다. 비워 두면 원본 파일명을 사용합니다.
      - key: exist_handle_type
        title: 같은 이름 파일 처리
        tip: 저장 위치에 같은 이름의 파일이 있을 때 처리 방식을 선택합니다.
    outputList: []
  PDF.merge_pdf_files:
    title: PDF 병합
    comment: 여러 PDF 파일을 하나의 PDF 파일로 병합합니다.
    icon: merge-pdf-files
    helpManual: 폴더 안의 PDF 전체 또는 선택한 PDF 파일 목록을 하나로 병합합니다.
    inputList:
      - key: merge_type
        title: 병합 방식
        tip: 폴더 안의 PDF를 병합할지, 선택한 PDF 파일을 병합할지 선택합니다.
      - key: file_folder_path
        title: 병합 폴더
        tip: 병합할 PDF 파일들이 들어 있는 폴더를 선택합니다.
      - key: files_path
        title: 병합 파일
        tip: 병합할 PDF 파일들을 순서대로 선택합니다.
      - key: save_dir
        title: 저장 폴더
        tip: 병합한 PDF 파일을 저장할 폴더를 선택합니다.
      - key: new_file_name
        title: 새 파일명
        tip: 확장자를 제외한 병합 결과 파일명을 입력합니다. 비워 두면 기본 파일명을 사용합니다.
      - key: new_pwd_flag
        title: 새 PDF 비밀번호 설정
        tip: 병합 결과 PDF에 비밀번호를 설정할지 선택합니다.
      - key: new_pwd
        title: 새 PDF 비밀번호
        tip: 병합 결과 PDF에 설정할 비밀번호를 입력합니다.
      - key: exist_handle_type
        title: 같은 이름 파일 처리
        tip: 저장 위치에 같은 이름의 파일이 있을 때 처리 방식을 선택합니다.
    outputList:
      - key: pdf_merge_file_path
        title: 병합 PDF 경로
        tip: 저장된 병합 PDF 파일 경로를 저장합니다.
  PDF.extract_pdf_file:
    title: PDF 페이지 추출
    comment: PDF 문서에서 지정한 페이지를 추출해 새 PDF 파일로 저장합니다.
    icon: pdf-extract-page
    helpManual: 1-3,5처럼 입력한 페이지 범위만 새 PDF 파일로 추출합니다.
    inputList:
      - key: file_path
        title: PDF 파일 경로
        tip: 페이지를 추출할 PDF 파일을 선택합니다.
      - key: pwd
        title: PDF 비밀번호
        tip: 암호화된 PDF인 경우 비밀번호를 입력합니다. 비밀번호가 없으면 비워 둡니다.
      - key: page_range
        title: 지정 페이지
        tip: 1-3,5,7-9처럼 추출할 페이지 범위를 입력합니다.
      - key: save_dir
        title: 저장 폴더
        tip: 추출한 PDF 파일을 저장할 폴더를 선택합니다.
      - key: new_file_name
        title: 새 파일명
        tip: 확장자를 제외한 새 PDF 파일명을 입력합니다. 비워 두면 원본 파일명을 사용합니다.
      - key: new_pwd_flag
        title: 새 PDF 비밀번호 설정
        tip: 추출 결과 PDF에 비밀번호를 설정할지 선택합니다.
      - key: new_pwd
        title: 새 PDF 비밀번호
        tip: 추출 결과 PDF에 설정할 비밀번호를 입력합니다.
      - key: exist_handle_type
        title: 같은 이름 파일 처리
        tip: 저장 위치에 같은 이름의 파일이 있을 때 처리 방식을 선택합니다.
    outputList:
      - key: extract_file_path
        title: 추출 PDF 경로
        tip: 저장된 추출 PDF 파일 경로를 저장합니다.
  PDF.extract_forms_from_pdf:
    title: PDF 표를 Excel로 추출
    comment: PDF 문서의 표 데이터를 추출해 Excel 파일로 저장합니다.
    icon: pdf-extract-table-to-excel
    helpManual: 전체 페이지 또는 지정 페이지 범위에서 표를 찾아 Excel 파일로 저장합니다.
    inputList:
      - key: file_path
        title: PDF 파일 경로
        tip: 표를 추출할 PDF 파일을 선택합니다.
      - key: pwd
        title: PDF 비밀번호
        tip: 암호화된 PDF인 경우 비밀번호를 입력합니다. 비밀번호가 없으면 비워 둡니다.
      - key: select_range
        title: 페이지 범위
        tip: 전체 페이지 또는 지정 페이지 중 표 추출 범위를 선택합니다.
      - key: page_range
        title: 지정 페이지
        tip: 1-3,5,7-9처럼 표를 추출할 페이지 범위를 입력합니다.
      - key: combine_flag
        title: 여러 표 병합
        tip: 여러 페이지에서 찾은 표를 하나의 시트로 병합할지 선택합니다.
      - key: save_dir
        title: 저장 폴더
        tip: 추출 결과 Excel 파일을 저장할 폴더를 선택합니다.
      - key: new_file_name
        title: Excel 파일명
        tip: 확장자를 제외한 Excel 파일명을 입력합니다. 비워 두면 원본 파일명을 사용합니다.
      - key: exist_handle_type
        title: 같은 이름 파일 처리
        tip: 저장 위치에 같은 이름의 파일이 있을 때 처리 방식을 선택합니다.
    outputList:
      - key: forms_file_path
        title: Excel 파일 경로
        tip: 저장된 Excel 파일 경로를 저장합니다.
  PDF.convert_pdf_to_img:
    title: PDF를 이미지로 변환
    comment: PDF 문서의 페이지를 이미지 파일로 변환합니다.
    icon: pdf-page-to-image
    helpManual: 전체 페이지 또는 지정 페이지 범위를 PNG 또는 JPEG 이미지로 저장합니다.
    inputList:
      - key: file_path
        title: PDF 파일 경로
        tip: 이미지로 변환할 PDF 파일을 선택합니다.
      - key: pwd
        title: PDF 비밀번호
        tip: 암호화된 PDF인 경우 비밀번호를 입력합니다. 비밀번호가 없으면 비워 둡니다.
      - key: image_type
        title: 이미지 형식
        tip: 변환 이미지를 PNG 또는 JPEG 중 어떤 형식으로 저장할지 선택합니다.
      - key: select_range
        title: 페이지 범위
        tip: 전체 페이지 또는 지정 페이지 중 변환 범위를 선택합니다.
      - key: page_range
        title: 지정 페이지
        tip: 1-3,5,7-9처럼 이미지로 변환할 페이지 범위를 입력합니다.
      - key: save_dir
        title: 저장 폴더
        tip: 변환한 이미지 파일을 저장할 폴더를 선택합니다.
      - key: prefix
        title: 이미지 파일 접두사
        tip: 저장할 이미지 파일명 앞에 붙일 접두사를 입력합니다. 비워 두면 원본 파일명을 사용합니다.
      - key: exist_handle_type
        title: 같은 이름 파일 처리
        tip: 저장 위치에 같은 이름의 파일이 있을 때 처리 방식을 선택합니다.
    outputList: []
  PDF.convert_img_to_pdf:
    title: 이미지를 PDF로 변환
    comment: 여러 이미지 파일을 하나의 PDF 파일로 변환합니다.
    icon: pdf-page-to-image
    helpManual: 선택한 이미지 파일을 단일 페이지 또는 여러 페이지 PDF로 저장합니다.
    inputList:
      - key: image_files
        title: 이미지 파일
        tip: PDF로 변환할 이미지 파일들을 선택합니다.
      - key: save_dir
        title: 저장 폴더
        tip: 변환한 PDF 파일을 저장할 폴더를 선택합니다.
      - key: new_file_name
        title: PDF 파일명
        tip: 확장자를 제외한 PDF 파일명을 입력합니다. 비워 두면 기본 파일명을 사용합니다.
      - key: layout_type
        title: 이미지 배치
        tip: 이미지마다 새 페이지를 만들지, 여러 이미지를 한 페이지에 배치할지 선택합니다.
      - key: new_pwd_flag
        title: PDF 비밀번호 설정
        tip: 변환 결과 PDF에 비밀번호를 설정할지 선택합니다.
      - key: new_pwd
        title: PDF 비밀번호
        tip: 변환 결과 PDF에 설정할 비밀번호를 입력합니다.
      - key: exist_handle_type
        title: 같은 이름 파일 처리
        tip: 저장 위치에 같은 이름의 파일이 있을 때 처리 방식을 선택합니다.
    outputList:
      - key: pdf_file_path
        title: PDF 파일 경로
        tip: 저장된 PDF 파일 경로를 저장합니다.
options:
  SelectRangeType:
    - value: all
      label: 전체 페이지
    - value: part
      label: 지정 페이지
  TextSaveType:
    - value: none
      label: 저장 안 함
    - value: word
      label: Word 파일
    - value: txt
      label: 텍스트 파일
    - value: word_and_txt
      label: Word와 텍스트 파일
  FileExistenceType:
    - value: overwrite
      label: 기존 파일 덮어쓰기
    - value: rename
      label: 새 이름으로 저장
    - value: cancel
      label: 저장 건너뛰기
  PictureType:
    - value: png
      label: PNG
    - value: jpeg
      label: JPEG
  MergeType:
    - value: folder
      label: 폴더 병합
    - value: file
      label: 파일 병합
  ImageLayoutType:
    - value: single_page
      label: 이미지별 페이지 생성
    - value: multiple_pages
      label: 한 페이지에 여러 이미지 배치
  Bool:
    - value: true
      label: 예
    - value: false
      label: 아니오
