atomic:
  WinEle.click_element:
    title: 요소 클릭(데스크톱)
    comment: '선택한 요소 @{pick}를 @{click_type} 방식으로 클릭하고 @{wait_time}초 동안 대기합니다.'
    icon: click-element-win
    helpManual: ''
    inputList:
      - key: pick
        title: 요소 선택
        tip: ''
      - key: click_button
        title: 클릭 버튼
        tip: ''
      - key: click_type
        title: 클릭 유형
        tip: ''
      - key: wait_time
        title: 요소 대기 시간
        tip: ''
      - key: horizontals_offset
        title: 가로 오프셋
        tip: ''
      - key: verticals_offset
        title: 세로 오프셋
        tip: ''
      - key: keyboard_input
        title: 키보드 입력
        tip: 클릭할 때 함께 누를 키를 선택합니다.
    outputList: []
  WinEle.screenshot_element:
    title: 요소 스크린샷(데스크톱)
    comment: '선택한 요소 @{pick}를 스크린샷으로 저장합니다. 저장 폴더: @{file_path}'
    icon: element-screenshot-win
    helpManual: ''
    inputList:
      - key: pick
        title: 요소 선택
        tip: ''
      - key: file_path
        title: 파일 저장 경로
        tip: ''
      - key: file_name
        title: 파일이름
        tip: ''
      - key: exist_type
        title: 파일명 충돌 처리 방식
        tip: ''
    outputList: []
  WinEle.hover_element:
    title: 요소에 마우스 올리기(데스크톱)
    comment: 선택한 요소 @{pick} 위로 마우스를 이동하고 @{wait_time}초 동안 대기합니다.
    icon: mouse-hover-element-win
    helpManual: ''
    inputList:
      - key: pick
        title: 요소 선택
        tip: ''
      - key: wait_time
        title: 요소 대기 시간
        tip: ''
    outputList: []
  WinEle.input_text_element:
    title: 입력란 채우기(데스크톱)
    comment: 입력란 @{pick}에 @{input_type} 방식으로 @{text}를 입력합니다.
    icon: fill-input-win
    helpManual: ''
    inputList:
      - key: pick
        title: 요소 선택
        tip: ''
      - key: input_type
        title: 입력 유형
        tip: ''
      - key: text
        title: 입력 내용
        tip: ''
      - key: credential_text
        title: 선택근거
        tip: ''
      - key: clear_first
        title: 입력 전 기존 내용 지우기
        tip: ''
      - key: wait_time
        title: 요소 대기 시간
        tip: ''
    outputList: []
  WinEle.get_element_text:
    title: 요소 텍스트 가져오기(데스크톱)
    comment: 요소 @{pick}의 텍스트를 가져와 @{ele_text}에 저장합니다.
    icon: get-element-text-win
    helpManual: ''
    inputList:
      - key: pick
        title: 요소 선택
        tip: ''
      - key: wait_time
        title: 요소 대기 시간
        tip: ''
    outputList:
      - key: ele_text
        title: 요소 텍스트
        tip: ''
  WinEle.similar:
    title: 유사 요소 목록 가져오기(데스크톱)
    comment: 선택한 요소 @{pick}와 유사한 요소 목록을 찾아 @{get_similar_ele}에 저장합니다.
    icon: get-similar-elements-win
    helpManual: ''
    inputList:
      - key: pick
        title: 요소 선택
        tip: 선택한 요소와 같은 위치 기준의 유사 요소를 찾습니다.
      - key: wait_time
        title: 요소 대기 시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList:
      - key: get_similar_ele
        title: 원정보
        tip: ''
options:
  MouseClickButton:
    - value: left
      label: 왼쪽 버튼
    - value: right
      label: 오른쪽 버튼
    - value: middle
      label: 가운데 버튼
  MouseClickType:
    - value: click
      label: 클릭
    - value: double_click
      label: 더블클릭
  MouseClickKeyboard:
    - value: none
      label: 사용 안 함
    - value: alt
      label: Alt
    - value: ctrl
      label: Ctrl
    - value: shift
      label: Shift
    - value: win
      label: Win
  FileExistenceType:
    - value: overwrite
      label: 기존 파일 덮어쓰기
    - value: rename
      label: 사본 파일 생성
    - value: cancel
      label: 저장 건너뛰기
  ElementInputType:
    - value: keyboard
      label: 키보드 입력
    - value: clipboard
      label: 입력
    - value: credential
      label: 근거입력
  Bool:
    - value: true
      label: 예
    - value: false
      label: 아니오
