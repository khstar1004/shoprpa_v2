atomic:
  DataTable.read_data:
    title: 데이터 테이블 읽기
    comment: >-
      데이터 테이블 읽기 @{read_type} 중의데이터, 출력까지변수
      @{cell_info||row_info||column_info||area_info}
    icon: read_data_table
    helpManual: ''
    inputList:
      - key: read_type
        title: 조회 방식
        tip: 데이터를 가져올 방식을 선택합니다.
      - key: row
        title: 행
        tip: '가져올 행을 지정합니다. 예: 1, 2, 3...'
      - key: col
        title: 열
        tip: '가져올 열을 지정합니다. 예: A, B, C, AB...'
      - key: start_row
        title: 시작 행
        tip: '가져올 시작 행을 지정합니다. 예: 1, 2, 3...'
      - key: start_col
        title: 시작 열
        tip: '가져올 시작 열을 지정합니다. 예: A, B, C, AB...'
      - key: end_row
        title: 끝 행
        tip: 끝 행은 시작 행보다 커야 합니다. 0 또는 비워 두면 마지막 행까지 가져옵니다.
      - key: end_col
        title: 끝 열
        tip: 끝 열은 시작 열보다 뒤에 있어야 합니다. 비워 두면 마지막 열까지 가져옵니다.
      - key: is_trim_spaces
        title: 앞뒤 공백 제거
        tip: 데이터를 가져올 때 문자열 앞뒤 공백을 제거할지 선택합니다.
      - key: is_replace_none
        title: 여부빈값
        tip: 데이터를 가져올 때 None 값을 빈 문자열로 바꿀지 선택합니다.
    outputList:
      - key: cell_info
        title: 셀데이터
        tip: 반환지정셀의데이터정보, 유형로문자열
      - key: row_info
        title: 행데이터
        tip: 반환지정행의데이터정보, 유형로배열
      - key: column_info
        title: 열데이터
        tip: 반환지정열의데이터정보, 유형로배열
      - key: area_info
        title: 데이터
        tip: 반환지정의데이터정보, 유형로이배열
  DataTable.write_data:
    title: 데이터 테이블 쓰기
    comment: 입력데이터까지데이터테이블의 @{write_type}
    icon: write_data_table
    helpManual: ''
    inputList:
      - key: write_type
        title: 입력방식
        tip: 선택입력데이터의방식
      - key: row
        title: 행
        tip: 지정할입력의행(예1, 2, 3...)
      - key: col
        title: 열
        tip: 지정할입력의열(예A, B, C, AB...)
      - key: data
        title: 입력데이터
        tip: 입력할의데이터내용, 셀입력문자열, 행또는열입력배열, 입력이배열, 형식아니오기호합치기필요이면문자열관리
      - key: start_row
        title: 시작 행
        tip: 지정할입력의시작 행(예1, 2, 3...)
      - key: start_col
        title: 시작 열
        tip: 지정할입력의시작 열(예A, B, C, AB...)
      - key: write_mode
        title: 입력방식
        tip: 선택입력데이터의방식(덮어쓰기, 삽입, 추가 입력)
      - key: cell_insert_shift
        title: 셀삽입방식
        tip: 삽입셀시기존셀방식(아래, 오른쪽)
      - key: row_insert_shift
        title: 행삽입방식
        tip: 삽입행시의위치(위방법삽입, 아래방법삽입)
      - key: column_insert_shift
        title: 열삽입방식
        tip: 삽입열시의위치(왼쪽가장자리삽입, 오른쪽가장자리삽입)
      - key: append_position
        title: 추가 입력방식
        tip: 선택추가 입력데이터의방식(행추가 입력, 열추가 입력)
    outputList: []
  DataTable.get_max_row:
    title: 데이터 테이블 읽기완료사용행
    comment: 데이터 테이블 읽기중완료사용의대행출력까지 @{max_row}
    icon: get_max_row
    helpManual: ''
    inputList: []
    outputList:
      - key: max_row
        title: 대행
        tip: 반환데이터테이블중의대행, 유형로정수
  DataTable.get_max_column:
    title: 데이터 테이블 읽기완료사용열
    comment: 데이터 테이블 읽기중완료사용의대열출력까지 @{max_column}
    icon: get_max_column
    helpManual: ''
    inputList: []
    outputList:
      - key: max_column
        title: 대열
        tip: 반환데이터테이블중의대열, 유형로정수
  DataTable.copy_data:
    title: 데이터 테이블 복사
    comment: 데이터 테이블 복사중의 @{copy_type} 데이터까지잘라내기
    icon: copy_data_table
    helpManual: ''
    inputList:
      - key: copy_type
        title: 복사방식
        tip: 선택복사데이터의방식(셀, 행, 열, )
      - key: row
        title: 행
        tip: 지정할복사의행(예1, 2, 3...)
      - key: col
        title: 열
        tip: 지정할복사의열(예A, B, C, AB...)
      - key: start_row
        title: 시작 행
        tip: 지정할복사의시작 행(예1, 2, 3...)
      - key: start_col
        title: 시작 열
        tip: 지정할복사의시작 열(예A, B, C, AB...)
      - key: end_row
        title: 끝 행
        tip: 끝 행은 시작 행보다 커야 합니다. 0 또는 비워 두면 마지막 행까지 가져옵니다.
      - key: end_col
        title: 끝 열
        tip: 끝 열은 시작 열보다 뒤에 있어야 합니다. 비워 두면 마지막 열까지 가져옵니다.
    outputList:
      - key: copied_cell
        title: 복사의셀
        tip: 으로문자열방식반환복사의셀데이터
      - key: copied_row
        title: 복사의행
        tip: 으로배열방식반환복사의행데이터
      - key: copied_column
        title: 복사의열
        tip: 으로배열방식반환복사의열데이터
      - key: copied_area
        title: 복사의
        tip: 으로이배열방식반환복사의데이터
  DataTable.paste_data:
    title: 데이터 테이블 붙여넣기
    comment: 에서잘라내기붙여넣기데이터까지데이터테이블중의 @{paste_type}
    icon: paste_data_table
    helpManual: ''
    inputList:
      - key: paste_type
        title: 붙여넣기방식
        tip: 선택붙여넣기데이터의방식(셀, 행, 열, )
      - key: row
        title: 행
        tip: 지정할붙여넣기의행(예1, 2, 3...)
      - key: col
        title: 열
        tip: 지정할붙여넣기의열(예A, B, C, AB...)
      - key: start_row
        title: 시작 행
        tip: 지정할붙여넣기의시작 행(예1, 2, 3...)
      - key: start_col
        title: 시작 열
        tip: 지정할붙여넣기의시작 열(예A, B, C, AB...)
    outputList: []
  DataTable.delete_data:
    title: 데이터 테이블 삭제
    comment: 데이터 테이블 삭제중 @{delete_type} 의데이터
    icon: delete_data_table
    helpManual: ''
    inputList:
      - key: delete_type
        title: 삭제방식
        tip: 선택삭제데이터의방식(셀, 행, 열, )
      - key: row
        title: 행
        tip: 지정할삭제의행(예1, 2, 3...)
      - key: col
        title: 열
        tip: 지정할삭제의열(예A, B, C, AB...)
      - key: start_row
        title: 시작 행
        tip: 지정할삭제의시작 행(예1, 2, 3...)
      - key: start_col
        title: 시작 열
        tip: 지정할삭제의시작 열(예A, B, C, AB...)
      - key: end_row
        title: 끝 행
        tip: 끝 행은 시작 행보다 커야 합니다. 0 또는 비워 두면 마지막 행까지 가져옵니다.
      - key: end_col
        title: 끝 열
        tip: 끝 열은 시작 열보다 뒤에 있어야 합니다. 비워 두면 마지막 열까지 가져옵니다.
      - key: delete_cell_move
        title: 셀삭제후방식
        tip: 삭제셀시의방식(왼쪽, 위)
      - key: delete_col_move
        title: 열삭제여부
        tip: 삭제열시의방식(왼쪽)
      - key: delete_row_move
        title: 행삭제여부
        tip: 삭제행시의방식(위)
    outputList: []
  DataTable.sort_table:
    title: 데이터 테이블 정렬
    comment: 데이터 테이블을 @{col} 열 기준으로 @{sort_type} 정렬
    icon: sort_table
    helpManual: ''
    inputList:
      - key: col
        title: 기준 열
        tip: 정렬 기준으로 사용할 열(예 A, B, C)
      - key: sort_type
        title: 정렬 방식
        tip: 오름차순 또는 내림차순 선택
    outputList: []
  DataTable.loop_data_table:
    title: 데이터테이블
    comment: 데이터테이블중의 @{loop_type}, 출력현재검색 @{index} 및현재값 @{value}
    icon: loop_data_table
    helpManual: ''
    inputList:
      - key: loop_type
        title: 유형
        tip: 선택의방식(행, 열, )
      - key: row
        title: 행
        tip: 지정할의행
      - key: col
        title: 열
        tip: 지정할의열
      - key: start_row
        title: 시작 행
        tip: 지정의시작 행
      - key: start_col
        title: 시작 열
        tip: 지정의시작 열
      - key: end_row
        title: 끝 행
        tip: 지정의끝 행
      - key: end_col
        title: 끝 열
        tip: 지정의끝 열
    outputList:
      - key: index
        title: 현재검색
        tip: 반환현재의검색
      - key: value
        title: 현재값
        tip: 반환현재의값
  DataTable.insert_row_column:
    title: 데이터테이블삽입행/열
    comment: 에서데이터테이블중삽입 @{amount} @{insert_type} 빈@{insert_type}
    icon: insert_row_column
    helpManual: ''
    inputList:
      - key: insert_type
        title: 삽입유형
        tip: 선택삽입행예열
      - key: row
        title: 행
        tip: 지정삽입위치의행
      - key: col
        title: 열
        tip: 지정삽입위치의열
      - key: amount
        title: 삽입수
        tip: 필요삽입의행/열수
      - key: row_insert_shift
        title: 행삽입방식
        tip: 삽입행시의위치(위방법삽입, 아래방법삽입)
      - key: column_insert_shift
        title: 열삽입방식
        tip: 삽입열시의위치(왼쪽가장자리삽입, 오른쪽가장자리삽입)
    outputList: []
  DataTable.insert_formula:
    title: 데이터테이블삽입방식
    comment: 에서데이터테이블셀 @{col}@{row} 중삽입방식 @{formula}
    icon: insert_formula
    helpManual: ''
    inputList:
      - key: row
        title: 행
        tip: 지정할삽입방식의행
      - key: col
        title: 열
        tip: 지정할삽입방식의열
      - key: formula
        title: 방식내용
        tip: >-
          필요삽입의방식, 예"=SUM(A1:A5)", 지요소 스타일패키지데이터, 시스템계획, , 텍스트, 날짜및시간, 조회및사용, , 및정보방식.가져오기 열기테이블파일의프로그램방식의지요소.
    outputList: []
  DataTable.set_column_title:
    title: 데이터테이블열정보
    comment: 데이터테이블 @{col} 열의정보로 @{title}
    icon: set_column_title
    helpManual: ''
    inputList:
      - key: col
        title: 열
        tip: 지정할의열
      - key: title
        title: 열정보
        tip: 필요의열정보
    outputList: []
  DataTable.get_column_title:
    title: 데이터 테이블 열 정보 가져오기
    comment: 데이터 테이블 읽기 @{col} 열의정보출력까지 @{column_title}
    icon: get_column_title
    helpManual: ''
    inputList:
      - key: col
        title: 열
        tip: 가져올 열을 지정합니다.
    outputList:
      - key: column_title
        title: 열정보
        tip: 반환지정열의정보
  DataTable.find_and_replace:
    title: 데이터테이블조회및
    comment: 에서데이터테이블중 @{find_type} 조회내용 @{find_value} @{is_replace:아니오}내용
    icon: find_and_replace
    helpManual: ''
    inputList:
      - key: find_type
        title: 조회유형
        tip: 선택조회의방식, 단일열조회또는전체테이블조회
      - key: col
        title: 열
        tip: 지정할조회의열(예A, B, C...), 에서단일열조회시사용
      - key: find_value
        title: 조회내용
        tip: 필요조회의내용
      - key: is_case_sensitive
        title: 분크기
        tip: 조회시여부분크기
      - key: is_replace
        title: 여부
        tip: 여부를조회까지의내용 행
      - key: replace_value
        title: 내용
        tip: 후의내용, 에서시사용
    outputList:
      - key: find_data_positions
        title: 조회위치
        tip: 반환조회까지의내용 에서의위치목록
  DataTable.filter_data_table:
    title: 데이터테이블선택
    comment: 근거 @{filter_type} 파일선택데이터테이블
    icon: filter_data_table
    helpManual: ''
    inputList:
      - key: filter_type
        title: 선택유형
        tip: 선택선택유형(열선택, 행선택, 테이블선택)
      - key: row
        title: 행
        tip: 지정할선택의행
      - key: col
        title: 열
        tip: 지정할선택의열
      - key: condition_type
        title: 파일유형
        tip: 선택파일유형
      - key: condition_value
        title: 파일값
        tip: 입력파일값
      - key: date_value
        title: 날짜값
        tip: 선택날짜값
      - key: date_range
        title: 날짜
        tip: 선택날짜
      - key: is_case_sensitive
        title: 분크기
        tip: 시간대 선택여부분크기
      - key: is_save_filtered
        title: 저장선택결과
        tip: 여부저장선택결과
    outputList:
      - key: data_filtered
        title: 선택결과
        tip: 반환선택후의데이터결과
  DataTable.import_data_table_from_file:
    title: 파일에서 데이터 테이블 가져오기
    comment: 파일 @{import_file_path}에서 데이터를 읽어 데이터 테이블로 가져옵니다.
    icon: import_data_table
    helpManual: ''
    inputList:
      - key: import_file_path
        title: 가져올 파일 경로
        tip: 가져올데이터의파일 경로
      - key: sheet_name
        title: 워크시트 이름
        tip: 가져올의워크시트 이름, 아니오이면로로테이블
    outputList: []
  DataTable.export_data_table_to_file:
    title: 내보내기데이터테이블까지파일
    comment: 를데이터테이블내보내기까지파일 @{export_dest_path}
    icon: export_data_table
    helpManual: ''
    inputList:
      - key: export_dest_path
        title: 내보내기목록경로
        tip: 내보내기파일의저장경로
      - key: export_file_name
        title: 내보내기파일이름
        tip: 내보내기의파일이름
      - key: export_file_type
        title: 내보내기파일유형
        tip: 선택내보내기의파일유형
      - key: is_overwrite
        title: 여부덮어쓰기이름파일
        tip: 결과가저장된 이름파일, 여부덮어쓰기해당파일, 아니오이면이름 변경
    outputList:
      - key: export_file_path
        title: 내보내기파일 경로
        tip: 반환내보내기파일의경로
options:
  BaseOperateType:
    - value: cell
      label: 셀
    - value: row
      label: 행
    - value: column
      label: 열
    - value: area
