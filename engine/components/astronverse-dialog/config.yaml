atomic:
  Dialog.message_box:
    title: 메시지안내
    comment: ''
    icon: message-dialog
    helpManual: 열기메시지안내대화상자, 가능지정메시지안내의내용및제목.
    inputList:
      - key: box_title
        title: 대화상자제목
        tip: 사용자 지정 대화상자위방법의제목, 제한제목내용문자수로50개문자.아니오입력이면제목로`메시지안내`
      - key: message_type
        title: 메시지유형
        tip: 선택 가능메시지유형
      - key: message_content
        title: 메시지내용
        tip: 사용자 지정 대화상자내부의내용, 제한내용문자수로120개문자
      - key: button_type
        title: 버튼
        tip: 메시지가능사용자행선택의버튼, 허용, 아니오허용빈선택상태
      - key: auto_check
        title: 자동으로 대화상자 닫기
        tip: ''
      - key: wait_time
        title: 시간 초과 대기(초)
        tip: 시간 초과대기시간, 찾을 수 없는 사용자마우스행로초과경과해당시간이면선택중버튼, 로60초
      - key: default_button_c
        title: 시간 초과선택중버튼
        tip: ''
      - key: default_button_cn
        title: 시간 초과선택중버튼
        tip: ''
      - key: default_button_y
        title: 시간 초과선택중버튼
        tip: ''
      - key: default_button_yn
        title: 시간 초과선택중버튼
        tip: ''
      - key: preview_button
        title: 
        tip: ''
    outputList:
      - key: result_button
        title: 저장사용자선택의버튼
        tip: ''
  Dialog.input_box:
    title: 입력대화상자
    comment: ''
    icon: input-dialog
    helpManual: 열기입력대화상자, 필요사용자행정보입력지정제출, 반환사용자에서대화상자중입력의내용.
    inputList:
      - key: box_title
        title: 대화상자제목
        tip: 제한제목내용문자수로50개문자, 아니오입력이면제목로`입력대화상자`
      - key: input_type
        title: 입력란유형
        tip: ''
      - key: input_title
        title: 입력란제목
        tip: ''
      - key: default_input_text
