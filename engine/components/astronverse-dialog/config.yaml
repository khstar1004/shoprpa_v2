options:
  MessageType:
    - value: message
      label: 정보
    - value: warning
      label: 경고
    - value: question
      label: 제목
    - value: error
      label: 오류
  ButtonType:
    - value: confirm
      label: 
    - value: confirm_cancel
      label: -가져오기 
    - value: yes_no
      label: 예-아니오
    - value: yes_no_cancel
      label: 예-아니오-가져오기 
  Bool:
    - value: true
      label: 예
    - value: false
      label: 아니오
  DefaultButtonC:
    - value: confirm
      label: 
  DefaultButtonCN:
    - value: confirm
      label: 
    - value: cancel
      label: 가져오기 
  DefaultButtonY:
    - value: 'yes'
      label: 예
    - value: 'no'
      label: 아니오
  DefaultButtonYN:
    - value: 'yes'
      label: 예
    - value: 'no'
      label: 아니오
    - value: cancel
      label: 가져오기 
  InputType:
    - value: text
      label: 텍스트
    - value: password
      label: 비밀번호
  SelectType:
    - value: single
      label: 단일선택
    - value: multi
      label: 다중선택
  TimeType:
    - value: time
      label: 시간
    - value: time_range
      label: 시간
  TimeFormat:
    - value: YYYY-MM-DD
      label: 년-월-일
