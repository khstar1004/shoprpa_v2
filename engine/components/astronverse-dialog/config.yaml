atomic:
  Dialog.message_box:
    title: 메시지 대화상자
    comment: 사용자에게 메시지, 경고, 질문, 오류 대화상자를 표시하고 선택한 버튼을 반환합니다.
    icon: message-dialog
    helpManual: 제목, 메시지 내용, 버튼 구성을 지정해 안내 대화상자를 표시합니다.
    inputList:
      - key: box_title
        title: 대화상자 제목
        tip: 대화상자 상단에 표시할 제목을 입력합니다. 최대 50자입니다.
      - key: message_type
        title: 메시지 유형
        tip: 정보, 경고, 질문, 오류 중 표시할 메시지 유형을 선택합니다.
      - key: message_content
        title: 메시지 내용
        tip: 대화상자에 표시할 내용을 입력합니다. 최대 120자입니다.
      - key: button_type
        title: 버튼 구성
        tip: 사용자가 선택할 수 있는 버튼 구성을 선택합니다.
      - key: auto_check
        title: 자동으로 대화상자 닫기
        tip: 제한 시간이 지나면 기본 버튼으로 자동 처리할지 선택합니다.
      - key: wait_time
        title: 시간 초과 대기(초)
        tip: 자동 닫기를 사용할 때 기다릴 시간을 초 단위로 입력합니다.
      - key: default_button_c
        title: 시간 초과 시 선택할 버튼
        tip: 제한 시간이 지나면 자동으로 선택할 버튼을 지정합니다.
      - key: default_button_cn
        title: 시간 초과 시 선택할 버튼
        tip: 제한 시간이 지나면 자동으로 선택할 버튼을 지정합니다.
      - key: default_button_y
        title: 시간 초과 시 선택할 버튼
        tip: 제한 시간이 지나면 자동으로 선택할 버튼을 지정합니다.
      - key: default_button_yn
        title: 시간 초과 시 선택할 버튼
        tip: 제한 시간이 지나면 자동으로 선택할 버튼을 지정합니다.
      - key: preview_button
        title: 미리보기
        tip: 대화상자를 미리 확인합니다.
    outputList:
      - key: result_button
        title: 선택한 버튼
        tip: 사용자가 클릭한 버튼 값을 저장합니다.
  Dialog.input_box:
    title: 입력 대화상자
    comment: 사용자에게 텍스트 또는 비밀번호 입력 대화상자를 표시하고 입력값을 반환합니다.
    icon: input-dialog
    helpManual: 입력 제목과 기본값을 지정해 사용자 입력을 받을 수 있습니다.
    inputList:
      - key: box_title
        title: 대화상자 제목
        tip: 대화상자 상단에 표시할 제목을 입력합니다. 최대 50자입니다.
      - key: input_type
        title: 입력란 유형
        tip: 텍스트 또는 비밀번호 입력 방식을 선택합니다.
      - key: input_title
        title: 입력 항목 제목
        tip: 입력란 위에 표시할 안내 제목을 입력합니다.
      - key: default_input_text
        title: 기본 텍스트
        tip: 텍스트 입력란에 미리 표시할 기본값을 입력합니다. 최대 120자입니다.
      - key: default_input_pwd
        title: 기본 비밀번호
        tip: 비밀번호 입력란에 미리 표시할 기본값을 입력합니다. 4자에서 16자까지 입력할 수 있습니다.
      - key: preview_button
        title: 미리보기
        tip: 대화상자를 미리 확인합니다.
    outputList:
      - key: input_content
        title: 입력 내용
        tip: 사용자가 입력한 내용을 저장합니다.
  Dialog.select_box:
    title: 선택 대화상자
    comment: 사용자에게 단일 또는 다중 선택 목록을 표시하고 선택 결과를 반환합니다.
    icon: select-dialog
    helpManual: 선택 항목 목록을 표시하고 사용자가 고른 값을 변수로 저장합니다.
    inputList:
      - key: box_title
        title: 대화상자 제목
        tip: 대화상자 상단에 표시할 제목을 입력합니다.
      - key: select_type
        title: 선택 방식
        tip: 단일 선택 또는 다중 선택 방식을 선택합니다.
      - key: options
        title: 선택 항목
        tip: 사용자에게 보여 줄 선택 항목 목록을 입력합니다.
      - key: options_title
        title: 선택 안내 제목
        tip: 선택 목록 위에 표시할 안내 문구를 입력합니다.
      - key: preview_button
        title: 미리보기
        tip: 대화상자를 미리 확인합니다.
    outputList:
      - key: select_result
        title: 선택 결과
        tip: 사용자가 선택한 값을 저장합니다.
  Dialog.select_time_box:
    title: 날짜/시간 선택 대화상자
    comment: 사용자에게 날짜 또는 날짜 범위 선택 대화상자를 표시하고 선택 결과를 반환합니다.
    icon: datetime-picker
    helpManual: 날짜, 날짜/시간, 범위 선택 결과를 변수로 저장합니다.
    inputList:
      - key: box_title
        title: 대화상자 제목
        tip: 대화상자 상단에 표시할 제목을 입력합니다.
      - key: time_type
        title: 선택 유형
        tip: 단일 날짜/시간 또는 범위 선택 방식을 선택합니다.
      - key: time_format
        title: 날짜/시간 형식
        tip: 사용자가 선택할 날짜와 시간의 표시 형식을 선택합니다.
      - key: default_time
        title: 기본 날짜/시간
        tip: 단일 선택 모드에서 기본으로 표시할 날짜 또는 시간을 입력합니다.
      - key: default_time_range
        title: 기본 날짜/시간 범위
        tip: 범위 선택 모드에서 기본으로 표시할 시작값과 끝값을 입력합니다.
      - key: input_title
        title: 입력 항목 제목
        tip: 선택 영역 위에 표시할 안내 제목을 입력합니다.
      - key: preview_button
        title: 미리보기
        tip: 대화상자를 미리 확인합니다.
    outputList:
      - key: select_time
        title: 선택한 날짜/시간
        tip: 사용자가 선택한 날짜, 시간 또는 범위를 저장합니다.
  Dialog.select_file_box:
    title: 파일/폴더 선택 대화상자
    comment: 사용자에게 파일 또는 폴더 선택 대화상자를 표시하고 선택한 경로를 반환합니다.
    icon: file-select-dialog
    helpManual: 파일 또는 폴더를 선택하게 하고 선택 결과 경로를 변수로 저장합니다.
    inputList:
      - key: box_title_file
        title: 파일 선택 제목
        tip: 파일 선택 대화상자 상단에 표시할 제목을 입력합니다.
      - key: box_title_folder
        title: 폴더 선택 제목
        tip: 폴더 선택 대화상자 상단에 표시할 제목을 입력합니다.
      - key: open_type
        title: 선택 대상
        tip: 파일 또는 폴더 중 선택할 대상을 지정합니다.
      - key: file_type
        title: 파일 유형
        tip: 파일 선택 모드에서 허용할 파일 유형을 선택합니다.
      - key: multiple_choice
        title: 다중 선택 허용
        tip: 여러 파일을 한 번에 선택할 수 있게 할지 선택합니다.
      - key: select_title
        title: 선택 안내 제목
        tip: 선택 창에 표시할 안내 문구를 입력합니다.
      - key: default_path
        title: 기본 폴더
        tip: 파일 또는 폴더 선택 창을 열 때 처음 표시할 폴더 경로를 입력합니다.
      - key: preview_button
        title: 미리보기
        tip: 대화상자를 미리 확인합니다.
    outputList:
      - key: select_file
        title: 선택한 경로
        tip: 사용자가 선택한 파일 또는 폴더 경로를 저장합니다.
  Dialog.custom_box:
    title: 사용자 지정 대화상자
    comment: 원하는 입력 항목과 버튼으로 구성한 대화상자를 표시하고 사용자의 선택 결과를 반환합니다.
    icon: custom-dialog
    helpManual: 사용자 지정 대화상자를 열고, 사용자가 입력하거나 선택한 결과를 변수로 저장합니다.
    inputList:
      - key: box_title
        title: 대화상자 제목
        tip: 대화상자 상단에 표시할 제목을 입력합니다.
      - key: design_interface
        title: 대화상자 구성
        tip: 버튼을 눌러 대화상자의 입력 항목과 레이아웃을 구성합니다.
      - key: auto_check
        title: 자동으로 대화상자 닫기
        tip: 제한 시간이 지나면 기본 버튼으로 자동 처리할지 선택합니다.
      - key: wait_time
        title: 시간 초과 대기(초)
        tip: 자동 닫기를 사용할 때 기다릴 시간을 초 단위로 입력합니다.
      - key: default_button
        title: 시간 초과 시 선택할 버튼
        tip: 제한 시간이 지나면 자동으로 선택할 버튼을 지정합니다.
    outputList:
      - key: dialog_result
        title: 대화상자 결과
        tip: 사용자가 입력한 값과 클릭한 버튼 결과를 저장합니다.
options:
  MessageType:
    - value: message
      label: 정보
    - value: warning
      label: 경고
    - value: question
      label: 질문
    - value: error
      label: 오류
  ButtonType:
    - value: confirm
      label: 확인
    - value: confirm_cancel
      label: 확인-취소
    - value: yes_no
      label: 예-아니오
    - value: yes_no_cancel
      label: 예-아니오-취소
  Bool:
    - value: true
      label: 예
    - value: false
      label: 아니오
  DefaultButtonC:
    - value: confirm
      label: 확인
  DefaultButtonCN:
    - value: confirm
      label: 확인
    - value: cancel
      label: 취소
  DefaultButtonY:
    - value: 'yes'
      label: 예
    - value: 'no'
      label: 아니오
  DefaultButtonYN:
    - value: 'yes'
      label: 예
    - value: 'no'
      label: 아니오
    - value: cancel
      label: 취소
  InputType:
    - value: text
      label: 텍스트
    - value: password
      label: 비밀번호
  SelectType:
    - value: single
      label: 클릭 선택
    - value: multi
      label: 다중 선택
  TimeType:
    - value: time
      label: 날짜/시간
    - value: time_range
      label: 날짜/시간 범위
  TimeFormat:
    - value: YYYY-MM-DD
      label: 년-월-일
    - value: YYYY-MM-DD HH:mm
      label: 년-월-일 시:분
    - value: YYYY-MM-DD HH:mm:ss
      label: 년-월-일 시:분:초
    - value: YYYY/MM/DD
      label: 년/월/일
    - value: YYYY/MM/DD HH:mm
      label: 년/월/일 시:분
    - value: YYYY/MM/DD HH:mm:ss
      label: 년/월/일 시:분:초
  OpenType:
    - value: file
      label: 파일
    - value: folder
      label: 폴더
  FileType:
    - value: '*'
      label: 모든 파일
    - value: .xls,.xlsx
      label: Excel 파일
    - value: .doc,.docx
      label: Word 파일
    - value: .txt
      label: 텍스트 파일
    - value: .png,.jpg,.jpeg,.bmp,.gif
      label: 이미지 파일
    - value: .ppt,.pptx
      label: PowerPoint 파일
    - value: .zip,.rar
      label: 압축 파일
