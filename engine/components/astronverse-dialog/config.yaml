      label: 년-월-일 시:분
    - value: YYYY-MM-DD HH:mm:ss
      label: 년-월-일 시:분:초
    - value: YYYY/MM/DD
      label: 년/월/일
    - value: YYYY/MM/DD HH:mm
      label: 년/월/일 시:분
    - value: YYYY/MM/DD HH:mm:ss
