        tip: 비워 두면 현재 탭을 닫습니다.
    outputList: []
  BrowserSoftware.screenshot:
    title: 웹 페이지 스크린샷
    comment: 브라우저 페이지를 캡처해 @{web_screen} 경로로 저장합니다.
    icon: webpage-screenshot
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
