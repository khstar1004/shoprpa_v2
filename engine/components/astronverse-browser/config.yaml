atomic:
  BrowserElement.wait_element:
    title: 요소 대기(web)
    comment: 브라우저 객체 @{browser_obj}에서 요소 @{element_data}가 지정한 상태가 될 때까지 대기합니다.
    icon: wait-element-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: 웹 페이지 요소가 있는 브라우저 객체를 선택합니다.
      - key: element_data
        title: 요소 선택
        tip: 대기할 웹 페이지 요소를 선택합니다.
      - key: ele_status
        title: 대기 유형
        tip: 요소가 나타날 때까지 기다릴지, 사라질 때까지 기다릴지 선택합니다.
      - key: element_timeout
        title: 요소 대기 시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList:
      - key: wait_element
        title: 대기 결과
        tip: 대기 조건 충족 여부를 true/false로 저장합니다.
  BrowserElement.click:
    title: 요소 클릭(web)
    comment: 브라우저 객체 @{browser_obj}의 요소 @{element_data}를 @{button_type:클릭} 방식으로 클릭합니다.
    icon: click-element-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: 작업할 웹 페이지의 브라우저 객체를 선택합니다.
      - key: element_data
        title: 요소 선택
        tip: 클릭할 웹 요소를 선택합니다.
      - key: simulate_flag
        title: 시뮬레이션 클릭
        tip: 예를 선택하면 실제 마우스 클릭처럼 실행하고, 아니오를 선택하면 선택 요소의 클릭 이벤트를 실행합니다.
      - key: assistive_key
        title: 
        tip: 클릭할 때 함께 누를 보조 키를 선택합니다.
      - key: button_type
        title: 클릭 위치
        tip: 마우스 클릭 방식을 선택합니다.
      - key: element_timeout
        title: 요소 대기 시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
      - key: scroll_into_center
        title: 가운데로 스크롤
        tip: 작업 전에 요소를 화면 가운데로 스크롤할지 선택합니다.
    outputList: []
  BrowserElement.input:
    title: 입력란 채우기(web)
    comment: >-
      선택한 브라우저 입력란에 텍스트, 클립보드 내용, 자격 증명 값을 입력하고 실제 입력된 내용을 반환합니다.
    icon: fill-input-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: 입력할 웹 페이지의 브라우저 객체를 선택합니다.
      - key: element_data
        title: 입력란 선택
        tip: 내용을 입력할 웹 입력 요소를 선택합니다.
      - key: simulate_flag
        title: 시뮬레이션 클릭
        tip: 실제 키 입력처럼 입력할지 선택합니다.
      - key: fill_type
        title: 입력 값 유형
        tip: 텍스트, 클립보드, 자격 증명 중 입력할 값의 출처를 선택합니다.
      - key: fill_input
        title: 입력 내용
        tip: 입력란에 쓸 텍스트를 입력합니다.
      - key: fill_input_credential
        title: 자격 증명
        tip: ''
      - key: element_timeout
        title: 요소 대기시간(초)
        tip: 입력 요소가 나타날 때까지 기다릴 시간을 초 단위로 입력합니다.
      - key: focus_time
        title: 포커스 대기(ms)
        tip: 입력 전 포커스를 유지할 시간을 밀리초 단위로 입력합니다.
      - key: write_gap_time
        title: 입력 간격(초)
        tip: 시뮬레이션 클릭 모드에서 글자 사이의 입력 간격을 초 단위로 입력합니다.
      - key: input_type
        title: 입력 방식
        tip: 기존 값을 지울지 끝에 이어 쓸지 선택합니다.
      - key: scroll_into_center
        title: 가운데로 스크롤
        tip: 입력 전 요소를 화면 가운데로 스크롤할지 선택합니다.
    outputList:
      - key: form_input
        title: 사용자 입력 내용
        tip: ''
  BrowserElement.hover_over:
    title: 요소 위에 마우스 올리기(web)
    comment: 브라우저 객체 @{browser_obj}의 요소 @{element_data} 위로 마우스를 이동합니다.
    icon: mouse-hover-element-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: 작업할 웹 페이지의 브라우저 객체를 선택합니다.
      - key: element_data
        title: 요소 선택
        tip: 마우스를 올릴 요소를 선택합니다.
      - key: element_timeout
        title: 요소 대기 시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
      - key: scroll_into_center
        title: 가운데로 스크롤
        tip: 작업 전에 요소를 화면 가운데로 스크롤할지 선택합니다.
    outputList: []
  BrowserElement.screenshot:
    title: 선택 요소 스크린샷(web)
    comment: 브라우저 객체 @{browser_obj}의 선택 요소 @{element_data}를 이미지로 저장합니다.
    icon: pick-element-screenshot-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: 스크린샷을 찍을 요소가 있는 브라우저 객체를 선택합니다.
      - key: element_data
        title: 요소 선택
        tip: 스크린샷을 찍을 요소를 선택합니다.
      - key: file_path
        title: 스크린샷 저장 경로
        tip: 폴더 경로
      - key: image_name
        title: 이미지 이름
        tip: '저장할 이미지 파일명을 입력합니다. 예: image.jpg'
      - key: element_timeout
        title: 요소 대기 시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList:
      - key: xpath_shot
        title: 스크린샷 파일 경로
        tip: 저장된 스크린샷 파일 경로입니다.
  BrowserElement.position_screenshot:
    title: 요소 위치 스크린샷(web)
    comment: 브라우저 객체 @{browser_obj}의 요소 @{element_data} 위치를 기준으로 스크린샷을 저장합니다.
    icon: element-position-screenshot-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: ''
      - key: element_data
        title: 요소 선택
        tip: ''
      - key: file_path
        title: 스크린샷 저장 경로
        tip: ''
      - key: image_name
        title: 이미지 이름
        tip: ''
      - key: element_timeout
        title: 요소 대기 시간(초)
        tip: ''
    outputList:
      - key: position_shot
        title: 스크린샷 파일 경로
        tip: ''
  BrowserElement.scroll:
    title: 웹 페이지 스크롤
    comment: 브라우저 객체 @{browser_obj}에서 가로 또는 세로 방향으로 웹 페이지를 스크롤합니다.
    icon: mouse-scroll-webpage
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: 스크롤할 웹 페이지의 브라우저 객체를 선택합니다.
      - key: scrollbar_type
        title: 스크롤 대상
        tip: 전체 페이지 또는 지정 요소 중 스크롤할 대상을 선택합니다.
      - key: element_data
        title: 요소 선택
        tip: 지정 요소를 스크롤 대상으로 사용할 때 선택합니다.
      - key: scroll_direction
        title: 방향
        tip: ''
      - key: x_scroll_type
        title: 가로위치
        tip: ''
      - key: x_custom_scroll_dis
        title: 가로지정거리
        tip: 픽셀 단위 거리입니다. 0-9999 사이 값을 입력합니다.
      - key: y_scroll_type
        title: 세로위치
        tip: ''
      - key: y_custom_scroll_dis
        title: 세로지정거리
        tip: 픽셀 단위 거리입니다. 0-9999 사이 값을 입력합니다.
      - key: element_timeout
        title: 요소 대기 시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList: []
  BrowserElement.scroll_into_view:
    title: 요소가 보이도록 스크롤(web)
    comment: 웹 페이지 요소 @{element_data}가 보이도록 스크롤합니다.
    icon: element-to-visible-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: 요소가 있는 브라우저 객체를 선택합니다.
      - key: element_data
        title: 요소 선택
        tip: 보이도록 스크롤할 요소를 선택합니다.
      - key: element_timeout
        title: 요소 대기 시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
      - key: scroll_into_center
        title: 가운데로 스크롤
        tip: 요소를 화면 가운데에 맞출지 선택합니다.
    outputList: []
  BrowserElement.similar:
    title: 유사 요소 목록 가져오기(web)
    comment: >-
      브라우저 객체 @{browser_obj}에서 선택한 요소 @{element_data}와 유사한 요소 목록을 가져옵니다.
      @{get_similar_ele}
    icon: get-similar-elements-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: 요소를 찾을 웹 페이지의 브라우저 객체를 선택합니다.
      - key: element_data
        title: 요소 선택
        tip: 웹 페이지에서 기준 요소를 선택합니다.
      - key: get_type
        title: 요소
        tip: ''
      - key: attribute_name
        title: 속성 이름
        tip: ''
      - key: element_timeout
        title: 요소 대기 시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList:
      - key: get_similar_ele
        title: 원정보
        tip: ''
  BrowserElement.loop_similar:
    title: 원목록(web)
    comment: >-
      브라우저 객체 @{browser_obj}에서 선택한 요소 @{element_data}와 유사한 요소를 찾습니다.
      결과 @{start}부터 @{end}행까지를 @{item} 목록으로 출력하고, 필요하면 위치를 @{index}에 저장합니다.
    icon: loop-similar-elements-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: 요소를 찾을 웹 페이지의 브라우저 객체를 선택합니다.
      - key: element_data
        title: 요소 선택
        tip: 웹 페이지에서 기준 요소를 선택합니다.
      - key: get_type
        title: 요소
        tip: ''
      - key: start
        title: 위치
        tip: 0부터 시작하는 위치를 입력합니다.
      - key: end
        title: 결과위치
        tip: 0부터 시작하는 위치를 입력합니다. ,-1테이블후일개요소
      - key: attribute_name
        title: 속성 이름
        tip: ''
      - key: element_timeout
        title: 요소 대기 시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList:
      - key: index
        title: 위치
        tip: 반복 중 현재 위치를 출력합니다.
      - key: item
        title: 
        tip: 반복 중 현재 항목을 출력합니다.
  BrowserElement.element_text:
    title: 요소 텍스트 가져오기(web)
    comment: 브라우저 객체 @{browser_obj}에서 선택한 요소 @{element_data}의 텍스트를 가져와 @{data_pick}에 저장합니다.
    icon: get-element-text-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: 텍스트를 가져올 브라우저 객체를 선택합니다.
      - key: element_data
        title: 요소 선택
        tip: 텍스트를 가져올 요소 위치를 선택합니다.
      - key: element_timeout
        title: 요소 대기 시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList:
      - key: data_pick
        title: 출력변수
        tip: 가져온 텍스트를 문자열로 출력합니다.
  BrowserElement.slider_hover:
    title: 선택(web)
    comment: >-
      를 @{element_slider} 에서 @{drag_type}  @{drag_direction} 
      @{percent_value} %
    icon: pick-slider-drag-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: ''
      - key: element_slider
        title: 선택
        tip: ''
      - key: element_progress
        title: 선택
        tip: ''
      - key: percent_value
        title: 
        tip: ''
      - key: drag_direction
        title: 방법
        tip: ''
      - key: drag_type
        title: 유형
        tip: ''
      - key: duration
        title: 의시간
        tip: ''
    outputList: []
  BrowserElement.get_select:
    title: 드롭다운 값 가져오기(web)
    comment: 브라우저 객체 @{browser_obj}에서 드롭다운 요소 @{element_data}의 현재 값을 가져옵니다.
    icon: get-dropdown-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: ''
      - key: element_data
        title: 선택드롭다운
        tip: ''
      - key: current_content
        title: 현재 선택값 가져오기
        tip: 선택중내용또는모든내용
      - key: element_timeout
        title: 요소 대기 시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList:
      - key: get_selected
        title: 드롭다운선택중내용
        tip: ''
  BrowserElement.get_checked:
    title: 체크박스 상태 가져오기(web)
    comment: 브라우저 객체 @{browser_obj}에서 체크박스 요소 @{element_data}의 선택 상태를 가져옵니다.
    icon: get-checkbox-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: ''
      - key: element_data
        title: 선택복사선택
        tip: ''
      - key: element_timeout
        title: 요소 대기 시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList:
      - key: get_checkbox_checked
        title: 복사선택선택중내용
        tip: ''
  BrowserElement.set_select:
    title: 드롭다운 조작(web)
    comment: 브라우저 객체 @{browser_obj}에서 드롭다운 요소 @{element_data}를 @{pattern} 방식으로 @{value||solution} 값으로 선택합니다.
    icon: operate-dropdown-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: 작업할 웹 페이지의 브라우저 객체를 선택합니다.
      - key: element_data
        title: 드롭다운 요소
        tip: 조작할 드롭다운 요소를 선택합니다.
      - key: pattern
        title: 선택 방식
        tip: 텍스트 포함, 텍스트 일치, 순서 중 선택 방식을 고릅니다.
      - key: value
        title: 선택할 값
        tip: 선택할 드롭다운 항목의 텍스트를 입력합니다.
      - key: solution
        title: 항목 순서
        tip: 0부터 시작하는 항목 순서를 입력합니다.
      - key: element_timeout
        title: 요소 대기 시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList: []
  BrowserElement.set_checked:
    title: 복사선택(web)
    comment: 브라우저 객체 @{browser_obj}에서 체크박스 요소 @{element_data}의 선택 상태를 가져옵니다. 후 @{checked_type}
    icon: operate-checkbox-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: ''
      - key: element_data
        title: 선택복사선택
        tip: ''
      - key: checked_type
        title: 유형
        tip: ''
      - key: element_timeout
        title: 요소 대기 시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList: []
  BrowserElement.element_operation:
    title: 요소(web)
    comment: 브라우저 객체 @{browser_obj}에서 요소 @{element_data}의 정보를 @{operation_type} 방식으로 처리합니다.
    icon: element-operation-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: ''
