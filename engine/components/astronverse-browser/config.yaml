atomic:
  BrowserElement.wait_element:
    title: 대기요소(web)
    comment: 대기브라우저객체 @{browser_obj} 중요소 @{element_data} 의(@{ele_status})
    icon: wait-element-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저객체
        tip: 선택지정의웹 페이지요소에서의브라우저객체
      - key: element_data
        title: 요소 선택
        tip: 선택할대기의웹 페이지요소
      - key: ele_status
        title: 대기유형
        tip: 대기출력또는대기실패
      - key: element_timeout
        title: 대기요소시간(초)
        tip: 초과경과해당시간중지대기
    outputList:
      - key: wait_element
        title: 대기결과
        tip: 출력요소여부출력/실패, 출력/실패로true, 반대로false
  BrowserElement.click:
    title: 요소 클릭(web)
    comment: 통신경과 @{button_type:클릭} 의방식클릭브라우저객체 @{browser_obj} 중의요소 @{element_data}
    icon: click-element-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저객체
        tip: 선택할대기페이지에서의브라우저객체
      - key: element_data
        title: 선택요소
        tip: 선택할의원정보
      - key: simulate_flag
        title: 사람클릭
        tip: 사람클릭예사람로방식클릭, 아니오이면를근거선택요소의연결행클릭
      - key: assistive_key
        title: 
        tip: 에서클릭시필요아래의키보드공가능
      - key: button_type
        title: 클릭위치
        tip: 선택마우스클릭의방식
      - key: element_timeout
        title: 대기원출력시간(초)
        tip: 초과경과해당시간중지대기
      - key: scroll_into_center
        title: 요소까지가능중
        tip: 선택여부를요소까지가능중위치, 모듈분웹 페이지가능오류위치, 선택 가능닫기 공가능
    outputList: []
  BrowserElement.input:
    title: 입력란(web)
    comment: >-
      에서지정의브라우저객체 @{browser_obj} 중선택입력란 @{element_data} , 으로 @{fill_type:키보드입력/입력}
      의방식입력내용 , 를실행 결과출력 @{form_input}
    icon: fill-input-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저객체
        tip: 선택할대기페이지에서의브라우저객체
      - key: element_data
        title: 선택입력란
        tip: 선택할내용의입력란요소
      - key: simulate_flag
        title: 사람입력
        tip: 사람입력예사람로방식입력, 아니오이면를근거요소의연결행입력
      - key: fill_type
        title: 입력유형
        tip: 선택입력란의방식
      - key: fill_input
        title: 입력내용
        tip: 입력란의내용
      - key: fill_input_credential
        title: 선택근거
        tip: ''
      - key: element_timeout
        title: 대기원출력시간(초)
        tip: 초과경과해당시간중지대기
      - key: focus_time
        title: 시간
        tip: 중지시간(ms)
      - key: write_gap_time
        title: 입력
        tip: 입력내용입력의시간(s)
      - key: input_type
        title: 추가 입력입력
        tip: 입력란에 자동 입력행추가 입력입력
      - key: scroll_into_center
        title: 요소까지가능중
        tip: 선택여부를요소까지가능중위치, 모듈분웹 페이지가능오류위치, 선택 가능닫기 공가능
    outputList:
      - key: form_input
        title: 사용자 입력내용
        tip: ''
