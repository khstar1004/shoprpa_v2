  BrowserSoftware.download_web_file:
    title: 파일 다운로드(web)
    comment: 웹 페이지에서 요소를 클릭하거나 URL을 입력해 파일을 다운로드하고 @{save_path}에 저장합니다.
    icon: file-download-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: 파일을 다운로드할 웹 브라우저 객체를 선택합니다.
      - key: element_data
        title: 다운로드 요소
        tip: 다운로드를 시작할 웹 요소를 선택합니다.
      - key: download_mode
        title: 다운로드 방식
        tip: ''
      - key: link_str
        title: 다운로드 URL
        tip: ''
      - key: save_path
        title: 저장 폴더
        tip: 다운로드 파일을 저장할 폴더를 선택합니다.
      - key: custom_flag
        title: 파일명 직접 지정
        tip: ''
      - key: file_name
        title: 파일명
        tip: 확장자를 포함해도 되고, 생략하면 URL의 확장자를 붙입니다.
      - key: simulate_flag
        title: 시뮬레이션 클릭
        tip: 자동화 클릭 대신 키보드/마우스 시뮬레이션을 사용할지 선택합니다.
      - key: is_wait
        title: 다운로드 완료 대기
        tip: ''
      - key: time_out
        title: 대기 시간(초)
        tip: 다운로드 완료를 기다릴 최대 시간을 입력합니다.
    outputList:
      - key: load_file
        title: 다운로드 파일 경로
        tip: 다운로드된 파일 경로를 저장합니다.
  BrowserSoftware.upload_web_file:
    title: 파일 업로드(web)
    comment: 웹 페이지에서 업로드 요소를 클릭하고 파일 선택 대화상자에 @{upload_path}를 입력합니다.
    icon: file-upload-web
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: 파일을 업로드할 웹 브라우저 객체를 선택합니다.
      - key: element_data
        title: 업로드 요소
        tip: 파일 선택 대화상자를 여는 웹 요소를 선택합니다.
      - key: upload_path
        title: 업로드 파일 경로
        tip: '업로드할 파일 경로를 입력합니다. 여러 파일은 Python 목록 형식으로 입력합니다. 예: ["파일1경로", "파일2경로"]'
      - key: simulate_flag
        title: 시뮬레이션 클릭
        tip: 자동화 클릭 대신 키보드/마우스 시뮬레이션을 사용할지 선택합니다.
    outputList:
      - key: download_file
        title: 업로드 파일 경로
        tip: 업로드에 사용한 파일 경로를 저장합니다.
