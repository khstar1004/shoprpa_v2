atomic:
  CV.cv_click:
    title: 이미지 클릭
    comment: 이미지 @{input_data}의 @{click_position} 위치를 @{btn_type}/@{btn_model} 방식으로 클릭합니다.
    icon: click-image
    helpManual: 현재 창에서 지정한 이미지를 찾아 클릭합니다.
    inputList:
      - key: input_data
        title: 이미지
        tip: 이미지 라이브러리에서 선택하거나 화면에서 이미지를 선택합니다.
      - key: btn_type
        title: 마우스
        tip: ''
      - key: btn_model
        title: 클릭방식
        tip: ''
      - key: click_position
        title: 클릭 위치
        tip: 마우스를 클릭할 이미지 내 위치를 선택합니다.
      - key: specified_position
        title: 위치 지정
        tip: ''
      - key: horizontal_move
        title: 가로 이동
        tip: ''
      - key: vertical_move
        title: 세로 이동
        tip: ''
      - key: match_similarity
        title: 매칭 정확도
        tip: 현재 화면에서 선택한 이미지와 일치하는 정도를 설정합니다. 값이 높을수록 더 엄격하게 매칭합니다.
      - key: move_type
        title: 마우스 이동 방식
        tip: ''
      - key: move_speed
        title: 마우스 속도
        tip: ''
      - key: wait_time
        title: 이미지 대기출력시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList: []
  CV.hover_image:
    title: 이미지 위로 마우스 이동
    comment: 이미지 @{input_data}의 @{click_position} 위치로 마우스를 이동합니다.
    icon: mouse-hover-image
    helpManual: 현재 창에서 지정한 이미지를 찾아 해당 위치로 마우스를 이동합니다.
    inputList:
      - key: input_data
        title: 이미지
        tip: 이미지 라이브러리에서 선택하거나 화면에서 이미지를 선택합니다.
      - key: click_position
        title: 위치
        tip: ''
      - key: specified_position
        title: 위치 지정
        tip: 이미지 내 기준 위치를 선택합니다.
      - key: horizontal_move
        title: 가로 이동
        tip: ''
      - key: vertical_move
        title: 세로 이동
        tip: ''
      - key: match_similarity
        title: 매칭 정확도
        tip: 현재 화면에서 선택한 이미지와 일치하는 정도를 설정합니다. 값이 높을수록 더 엄격하게 매칭합니다.
      - key: move_type
        title: 마우스 이동 방식
        tip: ''
      - key: move_speed
        title: 마우스 속도
        tip: ''
      - key: wait_time
        title: 이미지 대기출력시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList: []
  CV.is_image_exist:
    title: 이미지 존재 여부
    comment: 현재 화면에서 이미지 @{input_data}의 존재 여부를 확인합니다.
    icon: if-image-exists
    helpManual: 현재 창에서 지정한 이미지가 존재하는지 확인합니다.
    inputList:
      - key: input_data
        title: 이미지
        tip: 이미지 라이브러리에서 선택하거나 화면에서 이미지를 선택합니다.
      - key: exist_type
        title: 유형
        tip: 이미지가 존재하는 경우와 찾을 수 없는 경우의 실행 흐름을 나눕니다.
      - key: match_similarity
        title: 매칭 정확도
        tip: 현재 화면에서 선택한 이미지와 일치하는 정도를 설정합니다. 값이 높을수록 더 엄격하게 매칭합니다.
      - key: wait_time
        title: 이미지 대기시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList: []
  CV.wait_image:
    title: 이미지 대기
    comment: 이미지 대기(@{input_data})(@{wait_type})
    icon: wait-image
    helpManual: 이미지가 나타나거나 사라질 때까지 기다린 뒤 다음 흐름을 실행합니다.
    inputList:
      - key: input_data
        title: 이미지
        tip: 이미지 라이브러리에서 선택하거나 화면에서 이미지를 선택합니다.
      - key: wait_type
        title: 대기 유형
        tip: 이미지가 나타나거나 사라질 때까지 대기합니다.
      - key: wait_time
        title: 대기시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
      - key: match_similarity
        title: 매칭 정확도
        tip: 현재 화면에서 선택한 이미지와 일치하는 정도를 설정합니다. 값이 높을수록 더 엄격하게 매칭합니다.
    outputList:
      - key: image_wait_result
        title: 대기 결과
        tip: 대기 시간 안에 조건을 만족하면 true, 아니면 false를 반환합니다.
  CV.image_input:
    title: 이미지 입력란에 입력
    comment: 이미지로 찾은 입력란 @{input_data}에 @{input_type} 방식으로 @{input_content}를 입력합니다.
    icon: image-input-box
    helpManual: 이미지로 입력란을 찾아 클릭하고 내용을 입력합니다.
    inputList:
      - key: input_data
        title: 이미지
        tip: 이미지 라이브러리에서 선택하거나 화면에서 이미지를 선택합니다.
      - key: input_type
        title: 입력방식
        tip: ''
      - key: input_content
        title: 입력 내용
        tip: ''
      - key: simulate_flag
        title: 시뮬레이션 클릭
        tip: ''
      - key: interval
        title: 입력
        tip: ''
      - key: match_similarity
        title: 매칭 정확도
        tip: ''
      - key: wait_time
        title: 이미지 대기출력시간(초)
        tip: 지정한 시간이 지나면 대기를 중지합니다.
    outputList: []
options:
  BtnType:
    - value: left
      label: 왼쪽 버튼
    - value: middle
      label: 가운데 버튼
    - value: right
      label: 오른쪽 버튼
  BtnModel:
    - value: click
      label: 클릭
    - value: double_click
      label: 더블클릭
  PositionType:
    - value: center
      label: 가운데 버튼
    - value: random
      label: 임의 위치
    - value: specific
      label: 위치 지정
  MoveType:
    - value: linear
      label: 직선
    - value: simulation
      label: 자연스러운 이동
    - value: teleportation
      label: 즉시 이동
  Speed:
    - value: slow
      label: 느림
    - value: normal
      label: 보통
    - value: fast
      label: 빠름
  ExistType:
    - value: exist
      label: 존재함
    - value: not_exist
      label: 찾을 수 없습니다
  WaitType:
    - value: appear
      label: 이미지출력
    - value: disappear
      label: 이미지실패
  InputType:
    - value: text
      label: 텍스트 입력
    - value: clip
      label: 클립보드 입력
  Simulate_flag:
    - value: 'yes'
      label: 예
    - value: 'no'
      label: 아니오