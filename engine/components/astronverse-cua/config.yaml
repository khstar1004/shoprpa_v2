atomic:
  ComputerUse.run:
    title: 계획기기사용관리
    comment: 사용대유형분화면실행GUI작업: @{instruction}
    icon: computer-use
    helpManual: |
      사용설명: 
      1. 지원의패키지: 클릭, 더블클릭, 오른쪽 버튼, , 빠름, 입력텍스트, 대기
      2. Agent실행직선까지작업완료또는까지대데이터
      3. 모든스크린샷저장된 지정디렉터리, 가능사용디버그및인증
    inputList:
      - key: instruction
        title: 사용자
        tip: 설명필요실행의GUI작업, 예"열기계획기기계획123+456"
      - key: max_steps
        title: 대실행데이터
        tip: 작업실행의대데이터제한, 중지없음제한
      - key: temperature
        title: 유형정도
        tip: 유형완료시의정도매개변수, 제어출력의기기, 0
    outputList:
      - key: computer_use_res
        title: 실행 결과
        subTitle: AI완료
        tip: 패키지작업실행상태, 데이터, 시, 스크린샷디렉터리및오류정보의딕셔너리
