    inputList:
      - key: doc
        title: Word객체
        tip: 본프로그램전순서기존가능(예열기, 생성)반환의Word객체
      - key: select_type
        title: 선택텍스트방식
        tip: 지원선택전체문서, , 행
      - key: p_start
        title: 
        tip: 입력
      - key: p_end
        title: 결과
        tip: 입력결과
      - key: r_start
