        tip: 본프로그램전순서기존가능(예열기, 생성)반환의Word객체
      - key: text_source
        title: 입력방식
        tip: 선택직선연결입력또는에서파일가져오기
      - key: text
        title: 삽입텍스트
        tip: 필요삽입의텍스트
      - key: text_file_path
        title: 텍스트파일 경로
        tip: 삽입할 텍스트 파일을 선택합니다.
      - key: enter_flag
        title: 여부에서삽입전행
        tip: 선택여부에서삽입전행
      - key: font_size
        title: 문자크기
        tip: 문자크기
      - key: bold_flag
        title: 여부추가
        tip: 선택여부추가
      - key: italic_flag
        title: 여부
        tip: 선택여부
      - key: underline_flag
        title: 여부추가아래계획
        tip: 선택여부추가아래계획
      - key: font_name
        title: 문자이름
        tip: 문자이름
      - key: font_color
        title: 문자색상
        tip: 선택문자색상
    outputList: []
  Docx.select_text:
    title: Word 텍스트 선택
    comment: 에서Word객체 @{doc} 중선택텍스트
    icon: word-select-text
