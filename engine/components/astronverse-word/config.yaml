atomic:
  Docx.open_docx:
    title: Word 열기
    comment: 열기경로로 @{file_path} 의Word, 반환Word객체 @{doc_obj}
    icon: word-open-document
    helpManual: ''
    inputList:
      - key: file_path
        title: 문서경로
        tip: Word의경로
      - key: default_application
        title: 드라이버방식
        tip: 선택Word의열기방식, 예Word또는WPS
      - key: visible_flag
        title: 여부가능
        tip: 여부Word창
      - key: encoding
        title: 코드방식
        tip: 선택문서의코드방식, 예UTF-8또는GBK
      - key: open_pwd_flag
        title: 여부Word열기비밀번호
        tip: 선택여부입력할비밀번호열기문서
      - key: open_pwd
        title: Word열기비밀번호
        tip: 입력Word열기비밀번호
      - key: write_pwd_flag
        title: 여부Word입력비밀번호
        tip: 선택여부입력할비밀번호입력문서
      - key: write_pwd
        title: Word입력비밀번호
        tip: 입력Word입력비밀번호
    outputList:
      - key: doc_obj
        title: Word객체
        tip: 반환Word객체, 사용후
  Docx.read_docx:
    title: Word 내용 가져오기
    comment: 가져오기Word객체 @{doc} 내용, 반환문서내용 @{doc_data}
    icon: word-read-content
    helpManual: ''
    inputList:
      - key: doc
        title: Word객체
        tip: 본프로그램전순서기존가능(예열기, 생성)반환의Word객체
      - key: select_range
        title: 가져오기 
        tip: '문서를 읽을 범위를 선택합니다. 예: 전체 문서 또는 선택 영역'
    outputList:
      - key: doc_data
        title: 문서내용
        tip: ''
  Docx.create_docx:
    title: Word 생성
    comment: 지정한 폴더 @{file_path}에 Word 문서 @{file_name}을 만들고 Word 객체 @{doc_obj}와 저장 경로 @{doc_create_path}를 반환합니다.
    icon: word-new-document
    helpManual: ''
    inputList:
      - key: file_path
        title: 문서 저장 폴더
        tip: 새 Word 문서를 저장할 폴더를 선택합니다.
      - key: file_name
        title: 문서 이름
        tip: 생성할 Word 문서 이름을 입력합니다.
      - key: default_application
        title: 실행 프로그램
        tip: Word, WPS, 기본 프로그램 중 사용할 프로그램을 선택합니다.
      - key: visible_flag
        title: 창 표시
        tip: Word 창을 화면에 표시할지 선택합니다.
      - key: exist_handle_type
        title: 같은 이름이 있을 때
        tip: 기존 파일이 있을 때 처리 방식을 선택합니다.
    outputList:
      - key: doc_obj
        title: Word 객체
        tip: 생성한 Word 문서 객체를 반환합니다.
      - key: doc_create_path
        title: 문서 저장 경로
        tip: 생성한 Word 문서의 저장 경로를 반환합니다.
  Docx.save_docx:
    title: Word 저장
    comment: Word 객체 @{doc}를 @{save_type} 방식으로 저장하고 저장 경로 @{save_file_path}를 반환합니다.
    icon: word-save-document
    helpManual: ''
    inputList:
      - key: doc
        title: Word 객체
        tip: 저장할 Word 문서 객체를 선택합니다.
      - key: save_type
        title: 저장 방식
        tip: 저장, 다른 이름으로 저장, 저장 안 함 중 선택합니다.
      - key: file_path
        title: 저장 폴더
        tip: 다른 이름으로 저장할 폴더를 선택합니다.
      - key: file_name
        title: 파일 이름
        tip: 다른 이름으로 저장할 파일 이름을 입력합니다.
      - key: exist_handle_type
        title: 같은 이름이 있을 때
        tip: 기존 파일이 있을 때 처리 방식을 선택합니다.
      - key: close_flag
        title: 저장 후 닫기
        tip: 저장한 뒤 문서를 닫을지 선택합니다.
    outputList:
      - key: save_file_path
        title: 저장 경로
        tip: 저장된 Word 문서 경로를 반환합니다.
  Docx.close_docx:
    title: Word 닫기
    comment: Word 객체 @{doc}를 닫고 필요하면 저장합니다.
    icon: word-close-document
    helpManual: ''
    inputList:
      - key: doc
        title: Word 객체
        tip: 닫을 Word 문서 객체를 선택합니다.
      - key: close_range_flag
        title: 닫을 범위
        tip: 현재 문서만 닫을지 모든 문서를 닫을지 선택합니다.
      - key: save_type
        title: 저장 방식
        tip: 저장, 다른 이름으로 저장, 저장 안 함 중 선택합니다.
      - key: file_path
        title: 저장 폴더
        tip: 다른 이름으로 저장할 폴더를 선택합니다.
      - key: file_name
        title: 파일 이름
        tip: 다른 이름으로 저장할 파일 이름을 입력합니다.
      - key: exist_handle_type
        title: 같은 이름이 있을 때
        tip: 기존 파일이 있을 때 처리 방식을 선택합니다.
      - key: pkill_flag
        title: 프로그램 종료
        tip: 모든 문서를 닫을 때 Word 또는 WPS 프로세스까지 종료할지 선택합니다.
    outputList: []
  Docx.insert_docx:
    title: Word에 텍스트 삽입
    comment: Word객체 @{doc} 삽입텍스트 @{text}
    icon: word-insert-text
    helpManual: ''
    inputList:
      - key: doc
