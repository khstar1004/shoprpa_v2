      - key: font_size
        title: 크기
        tip: 선택문자크기
      - key: font_color
        title: 색상
        tip: 선택문자색상
      - key: font_set
        title: 문자
        tip: 선택문자
      - key: font_bold
        title: 추가
        tip: 선택여부추가
      - key: font_italic
        title: 
        tip: 선택여부
      - key: underline
        title: 아래계획
        tip: 선택여부아래계획
      - key: newline
