        tip: 선택삭제 여부모든까지의텍스트
      - key: p_start
        title: 
        tip: 입력
      - key: c_start
        title: 문자
        tip: 입력문자
      - key: p_end
        title: 결과
        tip: 입력결과
      - key: c_end
        title: 결과문자
        tip: 입력결과문자
    outputList: []
