    title: 텍스트 내용 추출
    comment: 에서텍스트 @{text} 중가져오기 @{extract_type} 유형의내용
    icon: text-extract-content
    helpManual: ''
    inputList:
      - key: text
        title: 기존텍스트
        tip: 입력가져올내용의텍스트
      - key: extract_type
        title: 조회 유형
        tip: 가져올 유형을 선택합니다.
      - key: regex_formula
        title: 정규식
        tip: 정규식을 입력하세요. 예시 - [\\uac00-\\ud7a3]은 한글, \\d는 숫자, [a-zA-Z]는 영문을 추출합니다
      - key: first_flag
        title: 가져오기 일매칭내용
        tip: 여부가져오기 일매칭내용
    outputList:
      - key: extract_from_string
        title: 조회 내용
        tip: 가져온 내용을 반환합니다.
