    helpManual: ''
    inputList:
      - key: text
        title: 기존텍스트
        tip: 입력필요내용의텍스트
      - key: replace_type
        title: 유형
        tip: 선택할의유형
      - key: replaced_string
        title: 필요의문자열
        tip: 입력필요의문자열
      - key: regex_formula
        title: 사용정규식
        tip: 입력정규식사용내용
      - key: new_value
        title: 로
        tip: 입력새값
      - key: first_flag
        title: 일매칭내용
        tip: 여부일매칭내용
      - key: ignore_case_flag
        title: 크기
        tip: 여부크기
    outputList:
      - key: replaced_content_string
