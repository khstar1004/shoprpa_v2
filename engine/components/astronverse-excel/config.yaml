atomic:
  Excel.open_excel:
    title: Excel 열기
    comment: 열기경로로 @{file_path} 의Excel, 반환Excel 객체 @{open_excel_obj}
    icon: excel-open-file
    helpManual: ''
    inputList:
      - key: file_path
        title: 파일 경로
        tip: 입력파일 경로
      - key: default_application
        title: 생성프로그램
        tip: 선택생성프로그램, 선택 가능Excel또는WPS
      - key: visible_flag
        title: 여부가능
        tip: ''
      - key: password
        title: 비밀번호
        tip: ''
      - key: update_links
        title: 업데이트외부모듈연결
        tip: ''
    outputList:
      - key: open_excel_obj
        title: 열기의Excel 객체
        tip: ''
  Excel.get_excel:
    title: 열려 있는 Excel 객체 가져오기
    comment: 파일 이름 @{file_name}에 해당하는 Excel 객체를 찾아 @{get_excel_obj}에 저장합니다.
    icon: get-open-excel-objects
    helpManual: ''
    inputList:
      - key: file_name
        title: 파일이름
        tip: 입력파일이름, 아니오입력할전순서Excel 열기의변수
    outputList:
      - key: get_excel_obj
        title: Excel 객체
        tip: ''
  Excel.create_excel:
    title: Excel 생성
    comment: >-
      에서경로로 @{file_path} 아래생성파일이름로 @{file_name} 의Excel, 반환Excel 객체
      @{create_excel_obj}
    icon: excel-create-file
    helpManual: ''
    inputList:
      - key: file_path
        title: 저장 폴더 경로
        tip: ''
      - key: file_name
        title: 저장파일이름
        tip: 입력파일이름
      - key: default_application
        title: 생성프로그램
        tip: 선택생성프로그램, 선택 가능Excel또는WPS
      - key: visible_flag
        title: 여부가능
        tip: ''
      - key: exist_handle_type
        title: 파일이름저장된 관리방식
        tip: 선택파일저장된 관리방식, 선택 가능덮어쓰기, 이름 변경, 가져오기 저장
      - key: password
        title: 파일열기비밀번호
        tip: ''
    outputList:
      - key: create_excel_obj
        title: 생성의Excel 객체
        tip: ''
      - key: excel_path
        title: 생성의Excel경로
        tip: ''
  Excel.save_excel:
    title: Excel 저장
    comment: Excel 저장객체 @{excel} , 저장방식로 @{save_type}
    icon: excel-save-file
    helpManual: ''
    inputList:
      - key: excel
        title: Excel 객체
        tip: Excel 객체를 입력합니다.
      - key: save_type
        title: 저장 방식
        tip: 선택저장 방식, 선택 가능저장또는다른 이름으로 저장
      - key: file_path
        title: 파일 경로
        tip: 입력파일 경로
      - key: file_name
        title: 파일이름
        tip: 입력파일이름
      - key: exist_handle_type
        title: 파일이름저장된 관리방식
        tip: 선택파일저장된 관리방식, 선택 가능덮어쓰기, 이름 변경, 가져오기 저장
      - key: close_flag
        title: 여부닫기파일
        tip: 선택저장후여부닫기파일, 선택 가능닫기또는아니오닫기
    outputList: []
  Excel.close_excel:
    title: Excel 닫기
    comment: >-
      닫기 @{close_range_flag}, 현재Excel 객체 @{excel}, 저장 방식로
      @{save_type_one||save_type_all}
    icon: excel-close-file
    helpManual: ''
    inputList:
      - key: close_range_flag
        title: 닫을 문서
        tip: 선택닫을 문서의, 예닫기현재 문서또는닫기모든 문서
      - key: excel
        title: Excel 객체
        tip: Excel 객체를 입력합니다.
      - key: save_type_one
        title: 저장 방식
        tip: 선택저장 방식, 선택 가능저장, 다른 이름으로 저장또는저장 안 함
      - key: save_type_all
        title: 저장 방식
        tip: 선택저장 방식, 선택 가능저장또는저장 안 함
      - key: file_path
        title: 파일 경로
        tip: 입력파일 경로
      - key: file_name
        title: 파일이름
        tip: 입력파일이름
      - key: exist_handle_type
        title: 파일이름저장된 관리방식
        tip: 선택파일저장된 관리방식, 선택 가능덮어쓰기, 이름 변경, 가져오기 저장
      - key: pkill_flag
        title: 여부닫기 
        tip: 선택여부닫기 , 선택 가능닫기또는아니오닫기
    outputList: []
  Excel.edit_excel:
    title: Excel에 쓰기
    comment: Excel 객체 @{excel} , 입력 내용 @{value}
    icon: excel-write-file
    helpManual: ''
    inputList:
      - key: excel
        title: Excel 객체
        tip: Excel 객체를 입력합니다.
      - key: edit_range
        title: 
        tip: 선택, 선택 가능행, 열, 
      - key: sheet_name
        title: 워크시트 이름
        tip: 입력필요의워크시트 이름, 예'Sheet1', 비워 두면사용Excel중의일개테이블 객체
      - key: start_col
        title: 열
        tip: 입력필요의열위치, 지원문자(예'A')또는숫자(예1)형식.
      - key: start_row
        title: 행
        tip: 값을 입력할 행을 지정합니다. COLUMN 선택 시 비워둘 수 있고, ROW 또는 AREA 선택 시 필요합니다.
      - key: value
        title: 입력 내용
        tip: >-
          수정의내용으로목록방식입력, 선택행또는열시입력목록예[1,2,3], 테이블에서지정행입력1,2,3;시간대 선택입력목록예[[1,1],[2,2]], 테이블에서지정행입력데이터
      - key: edit_type
        title: 입력방식
        tip: 선택입력 유형, 선택 가능덮어쓰기또는추가 입력
    outputList: []
  Excel.read_excel:
    title: Excel 내용 읽기
    comment: 가져오기Excel 객체 @{excel} 중테이블 @{sheet_name} 의Excel 내용
    icon: excel-read-content
    helpManual: ''
    inputList:
      - key: excel
        title: Excel 객체
        tip: Excel 객체를 입력합니다.
      - key: sheet_name
        title: 워크시트 이름
        tip: 입력필요의워크시트 이름, 예'Sheet1', 비워 두면사용Excel중의일개테이블 객체
      - key: read_range
        title: 가져오기 
        tip: 선택가져오기 , 선택 가능셀, 행, 열, , 완료
      - key: start_col
        title: 열
        tip: 입력열
      - key: end_col
        title: 끝 열
        tip: 입력끝 열
      - key: cell
        title: 셀
        tip: '값을 가져올 셀을 입력합니다. 예: A1'
      - key: row
        title: 행
        tip: 입력정수테이블행, 에서1열기 
      - key: column
        title: 열
        tip: 입력열이름, 지원입력문자A또는정수1
      - key: start_row
        title: 행
        tip: 입력정수테이블행, 에서1열기 
      - key: end_row
        title: 끝 행
        tip: 입력정수테이블행, -n테이블데이터n행
      - key: read_display
        title: 셀 내용 가져오기
        tip: 셀 내용을 가져올지 선택합니다.
      - key: trim_spaces
        title: 제거공백
        tip: 선택앞뒤 공백 제거, 선택 가능예또는아니오
      - key: replace_none
        title: 빈값
        tip: 선택여부를빈값(None)비워 두면문자열, 선택 가능예또는아니오
    outputList:
      - key: read_excel_contents
        title: Excel 내용
        tip: Excel 내용으로목록방식반환
  Excel.design_cell_type:
    title: 셀 서식 설정
    comment: 선택한 Excel 셀, 행, 열 범위의 글꼴, 글자색, 배경색, 정렬, 표시 형식을 설정합니다.
    icon: excel-set-cell-format
    helpManual: ''
    inputList:
      - key: excel
        title: Excel 객체
        tip: ''
      - key: sheet_name
        title: 워크시트 이름
        tip: "서식을 적용할 워크시트 이름을 입력합니다. 비워 두면 현재 워크시트를 사용합니다. 예: Sheet1"
      - key: design_type
        title: 적용 범위
        tip: 셀, 범위, 행, 열 중 서식을 적용할 대상을 선택합니다.
      - key: cell_position
        title: 셀 위치
        tip: "셀 주소를 입력합니다. 예: A1"
      - key: range_position
        title: 범위
        tip: "셀 범위를 입력합니다. 예: A1:B2"
      - key: col
        title: 열
        tip: "열 이름 또는 번호를 입력합니다. 예: A 또는 1"
      - key: row
        title: 행
        tip: 1부터 시작하는 행 번호를 입력합니다.
      - key: col_width
        title: 열 너비
        tip: ''
      - key: bg_color
        title: 배경색
        tip: ''
      - key: font_color
        title: 글자색
        tip: ''
      - key: font_type
        title: 글꼴 스타일
        tip: ''
      - key: font_name
        title: 글꼴 이름
        tip: ''
      - key: font_size
        title: 글자 크기
        tip: ''
      - key: numberformat
        title: 숫자형식
        tip: ''
      - key: numberformat_other
        title: 지정숫자형식
        tip: ''
      - key: horizontal_align
        title: 가로 정렬
        tip: ''
      - key: vertical_align
        title: 세로 정렬
        tip: ''
      - key: wrap_text
        title: 자동 줄 바꿈
        tip: ''
      - key: auto_row_height
        title: 행 높이
        tip: ''
      - key: auto_column_width
        title: 열 너비
        tip: ''
    outputList: []
  Excel.copy_excel:
    title: Excel 셀 복사
    comment: >-
      복사Excel 객체 @{excel} 중테이블 @{sheet_name} 의셀, 반환복사내용의문자열형식
      @{copy_excel_contents}
    icon: excel-copy-cell
    helpManual: ''
    inputList:
      - key: excel
        title: Excel 객체
        tip: ''
      - key: sheet_name
        title: 워크시트 이름
        tip: 입력필요의워크시트 이름, 예'Sheet1', 비워 두면사용Excel중의일개테이블 객체
      - key: copy_range_type
        title: 복사
        tip: ''
      - key: cell_position
        title: 셀 위치
        tip: 셀 위치, 예A1
      - key: row
        title: 행
        tip: 입력정수테이블행, 에서1열기 
      - key: col
        title: 열
        tip: 입력열이름, 지원입력문자A또는정수1
      - key: range_position
        title: 셀
        tip: 셀, 예A1:B2
    outputList:
      - key: copy_excel_contents
        title: Excel복사내용
        tip: ''
  Excel.paste_excel:
    title: Excel 셀 붙여넣기
    comment: Excel 객체 @{excel} 중테이블 @{sheet_name} 붙여넣기셀
    icon: excel-paste-cell
    helpManual: ''
    inputList:
      - key: excel
        title: Excel 객체
        tip: ''
      - key: sheet_name
        title: 워크시트 이름
        tip: 입력필요의워크시트 이름, 예'Sheet1', 비워 두면사용Excel중의일개테이블 객체
      - key: paste_type
        title: 붙여넣기유형
        tip: ''
      - key: start_location
        title: 위치
        tip: 입력셀 위치, 예A1
      - key: skip_blanks
        title: 여부건너뛰기빈행
        tip: ''
      - key: transpose
        title: 여부변환
        tip: ''
    outputList: []
  Excel.delete_excel_cell:
    title: Excel 셀 삭제
    comment: 삭제Excel 객체 @{excel} 중테이블 @{sheet_name} 의셀
    icon: excel-delete-cell
    helpManual: ''
    inputList:
      - key: excel
        title: Excel 객체
        tip: ''
      - key: sheet_name
        title: 워크시트 이름
        tip: 입력필요의워크시트 이름, 예'Sheet1', 비워 두면사용Excel중의일개테이블 객체
      - key: delete_range_excel
        title: 삭제
        tip: ''
      - key: coordinate
        title: 셀 위치
        tip: 입력셀 위치, 예A1
      - key: row
        title: 행
        tip: 입력정수테이블행, 에서1열기 
      - key: col
        title: 열
        tip: 입력열이름, 지원입력문자A또는정수1
      - key: data_region
        title: 셀
        tip: 입력셀, 예A1:B2
      - key: direction
        title: 데이터방법
        tip: ''
    outputList: []
  Excel.clear_excel_content:
    title: Excel 영역 내용 지우기
    comment: 지우기Excel 객체 @{excel} 중테이블 @{sheet_name} 의셀내용
    icon: excel-clear-range
    helpManual: ''
    inputList:
      - key: excel
        title: Excel 객체
        tip: ''
      - key: sheet_name
        title: 워크시트 이름
        tip: 입력필요의워크시트 이름, 예'Sheet1', 비워 두면사용Excel중의일개테이블 객체
      - key: select_type
        title: 선택
        tip: 선택할삭제의내용
      - key: cell_location
        title: 셀 위치
        tip: 입력셀 위치, 예A1
      - key: row
        title: 행
        tip: 입력정수테이블행, 에서1열기 
      - key: col
        title: 열
        tip: 입력열이름, 지원입력문자A또는정수1
      - key: data_range
        title: 셀
        tip: 입력의셀, 예A1:B2
      - key: clear_type
        title: 지우기유형
        tip: ''
    outputList: []
  Excel.insert_excel_row_or_column:
    title: 삽입Excel행또는열
    comment: Excel 객체 @{excel} 중테이블 @{sheet_name} 삽입행또는열
    icon: excel-insert-row-column
    helpManual: ''
    inputList:
      - key: excel
        title: Excel 객체
        tip: ''
      - key: sheet_name
        title: 워크시트 이름
        tip: 입력필요의워크시트 이름, 예'Sheet1', 비워 두면사용Excel중의일개테이블 객체
      - key: insert_type
        title: 삽입유형
        tip: ''
      - key: row
        title: 행
        tip: 입력정수테이블행, 에서1열기 
      - key: row_direction
        title: 삽입행방법
        tip: ''
      - key: col
        title: 열
        tip: 입력열이름, 지원입력문자A또는정수1
      - key: col_direction
        title: 삽입열방법
        tip: ''
      - key: blank_rows
        title: 여부삽입빈행/빈열
        tip: ''
      - key: insert_num
        title: 삽입행데이터
        tip: ''
      - key: insert_content
        title: 삽입내용
        tip: >-
          삽입단일행또는다중행시, 삽입내용필요로다중목록, 문자필요사용단일'', : 삽입1행, 입력 내용: [[123,24,32]], 삽입2행, 입력 내용: [[123,123],['aaa']], 이면입력excel내용로: 일행: 123
          123;이행: aaa;입력 내용: [[123,123],'aaa'], 이면입력excel내용로: 일행: 123  123;이행: a a
          a;결과가삽입의행또는열초과경과데이터길이정도, 다중의셀를보관비워 두면
    outputList: []
  Excel.get_excel_row_num:
    title: 가져오기Excel행데이터
    comment: 가져오기Excel 객체 @{excel} 중테이블 @{sheet_name} 의행데이터, 반환행데이터 @{excel_row_num}
    icon: excel-get-row-count
    helpManual: ''
    inputList:
      - key: excel
        title: Excel 객체
        tip: ''
      - key: sheet_name
        title: 워크시트 이름
        tip: 입력필요의워크시트 이름, 예'Sheet1', 비워 두면사용Excel중의일개테이블 객체
      - key: get_col_type
        title: 조회 유형
        tip: ''
      - key: col
        title: 열
        tip: 입력열이름, 지원입력문자A또는정수1
    outputList:
      - key: excel_row_num
        title: Excel행데이터
        tip: ''
  Excel.get_excel_col_num:
    title: 가져오기Excel열데이터
    comment: 가져오기Excel 객체 @{excel} 중테이블 @{sheet_name} 의열데이터, 반환열데이터 @{excel_col_num}
    icon: excel-get-column-count
    helpManual: ''
    inputList:
      - key: excel
        title: Excel 객체
        tip: ''
      - key: sheet_name
        title: 워크시트 이름
        tip: 입력필요의워크시트 이름, 예'Sheet1', 비워 두면사용Excel중의일개테이블 객체
      - key: get_row_type
        title: 조회 유형
        tip: ''
      - key: row
        title: 행
