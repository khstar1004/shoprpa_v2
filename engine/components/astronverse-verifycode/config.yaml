atomic:
  VerifyCode.picture_code:
    title: 일반 숫자/영문 인증 코드
    comment: 브라우저에서 인증 코드 이미지 @{picture_pick}를 인식해 결과를 @{code_result}에 저장합니다.
    icon: captcha-text
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: ''
      - key: picture_pick
        title: 인증 코드 이미지 선택
        tip: ''
      - key: code_type
        title: 인증 코드 유형
        tip: ''
      - key: input_flag
        title: 입력란에 자동 입력
        tip: ''
      - key: input_box
        title: 입력란 객체
        tip: ''
    outputList:
      - key: code_result
        title: 결과
        tip: ''
  VerifyCode.slider_code:
    title: 일반 슬라이더 인증 코드
    comment: >-
      이미지 @{picture_pick}에서 슬라이더 인증 코드 위치와 이동 거리를 계산합니다.
      @{drag_distance}
    icon: captcha-slider
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: ''
      - key: picture_pick
        title: 이미지 객체
        tip: ''
      - key: slider_pick
        title: 대상 객체 선택
        tip: ''
      - key: unmatched_flag
        title: 인증 코드 변수 사용 여부
        tip: ''
      - key: move_pic_pick
        title: 이미지 객체 선택
        tip: ''
      - key: mini_step
        title: 조정 길이(px)
        tip: ''
      - key: offset
        title: 보정량(px)
        tip: 필요하면 기준 보정량을 입력합니다.
    outputList:
      - key: drag_distance
        title: 거리
        tip: ''
  VerifyCode.click_code:
    title: 일반 클릭 인증 코드
    comment: 이미지 @{picture_pick}에서 클릭 인증 코드의 클릭 위치를 찾습니다.
    icon: captcha-click
    helpManual: ''
    inputList:
      - key: browser_obj
        title: 브라우저 객체
        tip: ''
      - key: picture_pick
        title: 클릭 인증 코드 이미지
        tip: 큰 이미지와 작은 순서 이미지를 함께 선택합니다.
      - key: hint_position
        title: 순서 이미지 위치
        tip: 순서 이미지가 큰 이미지 아래에 있으면 아래, 아니면 위를 선택합니다.
    outputList:
      - key: click_positions
        title: 클릭 위치
        tip: 인증 코드 클릭 위치를 반환합니다.
options:
  PictureCodeType:
    - value: '10110'
      label: 일반 숫자/영문 인증 코드1-4위치
    - value: '10111'
      label: 일반 숫자/영문 인증 코드5-8위치
    - value: '10211'
      label: 일반 숫자/영문 인증 코드()
  Bool:
    - value: true
      label: 예
    - value: false
      label: 아니오
  HintPosition:
    - value: bottom
      label: 아래
    - value: top
      label: 위