atomic:
  Email.send_email:
    title: 메일 보내기
    comment: 지정메일함 @{receiver} 메일 보내기
    icon: send-email
    helpManual: ''
    inputList:
      - key: receiver
        title: 수신자 메일함
        tip: ''
      - key: cc
        title: 메일함
        tip: ''
      - key: subject
        title: 제목
        tip: ''
      - key: is_html
        title: HTML 형식 사용
        tip: ''
      - key: content
        title: 내용
        tip: ''
      - key: attachment_path
        title: 파일경로
        tip: ''
      - key: mail_server
        title: 메일 서비스 서버
        tip: ''
      - key: other_mail_server
        title: 메일 서비스 서버
        tip: ''
      - key: mail_port
        title: 메일 서비스 서버단말
        tip: ''
      - key: use_ssl
        title: SSL 암호화 사용
        tip: ''
      - key: sender_mail
        title: 발송수신자 메일함
        tip: ''
      - key: send_name
        title: 발신자 이름
        tip: ''
      - key: password
        title: 비밀번호/권한 부여코드
        tip: ''
      - key: bcc
        title: 비밀메일함
        tip: ''
      - key: replace_table
        title: 가능테이블
        tip: ''
    outputList: []
  Email.receive_email:
    title: 메일 받기
    comment: 에서메일함(@{user_mail})메일 받기정보
    icon: receive-email
    helpManual: ''
    inputList:
      - key: mail_server
        title: 메일 서비스 서버주소
        tip: 선택일개메일함유형
      - key: custom_mail_server
        title: IMAP서비스서버주소
        tip: 입력지정의IMAP서비스서버주소
      - key: custom_mail_port
        title: IMAP서비스서버단말
        tip: 입력지정의IMAP서비스서버단말
      - key: user_mail
        title: 사용자메일계정
        tip: IMAP서비스서버인증의사용자명, 통신일반예메일함계정, 으로메일서비스상업의로
      - key: user_password
        title: 권한 부여코드
        tip: IMAP서비스서버인증의권한 부여코드, 일필요짧음정보인증열기통신, 모듈분메일함로계정비밀번호, 으로메일서비스상업의로
      - key: max_return_num
        title: 메일대반환수
        tip: 반환의대메일수
      - key: unseen_flag
        title: 미완료메일
        tip: 가져오기미완료메일또는전체메일
      - key: save_attachment_flag
        title: 저장파일
        tip: 여부다운로드메일파일
      - key: save_attachment_path
        title: 저장디렉터리
        tip: 파일의저장디렉터리
      - key: folder_name
        title: 폴더이름
        tip: 입력필요메일 받기의메일함이름, 로INBOX
      - key: mask_as_read_flag
        title: 로완료
        tip: 가져오기메일후, 를메일로완료상태
      - key: sender_text
        title: 발송파일사람중패키지의내용
        tip: 통신경과전송패키지닫기 문자행필터링
      - key: receiver_text
        title: 파일사람중패키지의내용
        tip: 통신경과수신패키지닫기 문자행필터링
      - key: theme_text
        title: 제목중패키지의내용
        tip: 통신경과제목패키지닫기 문자행필터링
      - key: content_text
        title: 정상문서중패키지의내용
        tip: 통신경과내용패키지닫기 문자행필터링
    outputList:
      - key: mail_list
        title: 저장메일목록
        tip: 지정일개변수 이름, 를반환의메일목록저장해당변수
options:
  Bool:
    - value: true
      label: 예
    - value: false
      label: 아니오
  EmailServerType:
    - value: other
      label: 메일함
    - value: '126'
      label: '126'
    - value: '163'
      label: '163'
    - value: qq
      label: QQ
    - value: shoprpa
      label: Shoprpa메일함