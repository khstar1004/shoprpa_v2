        tip: 입력인쇄너비정도
      - key: page_height
        title: 높이정도
        tip: 입력인쇄높이정도
      - key: print_num
        title: 인쇄데이터
        tip: 입력인쇄데이터, 1
      - key: orientation_type
        title: 인쇄버전방식
        tip: 선택인쇄버전방식, 가로/세로
      - key: scale
        title: (%)
        tip: 100%, 입력
      - key: margin_type
        title: 가장자리거리(단일위치)
        tip: ''
      - key: left_margin
        title: 왼쪽가장자리거리
        tip: ''
      - key: top_margin
        title: 위가장자리거리
        tip: ''
      - key: right_margin
        title: 오른쪽가장자리거리
        tip: ''
      - key: bottom_margin
        title: 아래가장자리거리
        tip: ''
      - key: page
