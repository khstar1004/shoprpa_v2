atomic:
  System.copy_clip:
    title: 클립보드에 복사
    comment: 를 @{content_type}  @{message||file_path||folder_path} 클립보드에 복사
    icon: copy-to-clipboard
    helpManual: 지원를텍스트 내용/파일/폴더클립보드에 복사
    inputList:
      - key: content_type
        title: 복사유형
        tip: 선택복사까지의내용유형
      - key: message
        title: 대기복사의텍스트 내용
        tip: 입력텍스트 내용
      - key: file_path
        title: 대기복사의파일 경로
        tip: 입력또는선택대기복사파일
      - key: folder_path
        title: 대기복사의폴더 경로
        tip: 입력또는선택대기복사폴더
    outputList: []
  System.clear_clip:
    title: 빈잘라내기
    comment: 빈잘라내기중의내용
    icon: clear-clipboard
    helpManual: 빈잘라내기중의내용
    inputList: []
    outputList: []
  System.paste_clip:
    title: 클립보드 가져오기
    comment: 클립보드에서 @{content_type} 내용을 가져와 @{output_content}에 저장합니다.
    icon: get-clipboard
    helpManual: 클립보드의 텍스트, 파일, 폴더를 가져올 수 있습니다. 파일/폴더는 지정한 저장 경로에 저장합니다.
    inputList:
      - key: content_type
        title: 가져올 유형
        tip: 클립보드에서 가져올 내용 유형을 선택합니다.
      - key: dst_path
        title: 저장 경로
        tip: 파일 또는 폴더를 저장할 경로를 선택하거나 입력합니다.
      - key: state_type
        title: 저장 경로가 없을 때
        tip: 저장 경로가 없을 때 실행할 동작
      - key: dst_file_name
        title: 저장 파일명
        tip: 비워 두면 기존 파일 이름을 사용합니다.
      - key: dst_folder_name
        title: 저장 폴더명
        tip: 비워 두면 기존 폴더 이름을 사용합니다.
    outputList:
      - key: output_content
        title: 클립보드 내용
        tip: 텍스트는 텍스트 변수로, 파일/폴더는 경로 정보로 출력합니다.
  System.compress:
    title: 압축
    comment: 압축 @{file_type} 까지지정디렉터리 @{compress_dir} 중, 저장압축패키지경로  @{compress_path}
    icon: compress
    helpManual: 압축선택파일 및 폴더까지지정디렉터리, 지원단일개또는다중개파일폴더시압축로일개압축패키지(압축후파일형식로zip형식)
    inputList:
      - key: file_type
        title: 선택압축방식
        tip: 선택압축파일/폴더/파일 및 폴더
      - key: file_path
        title: 대기압축파일
        tip: 선택또는입력대기압축파일 경로
      - key: folder_path
        title: 대기압축폴더
        tip: 선택또는입력대기압축폴더 경로
      - key: compress_dir
        title: 목록경로
        tip: 저장목록 압축파일 경로
      - key: state_type
        title: 대상 경로가 없을 때
        tip: 선택한 대상 경로가 없을 때 실행할 동작
      - key: compress_name
        title: 압축패키지이름
        tip: 지정압축패키지이름, 비워 두면이면으로압축목록중일개압축파일이름명령이름
      - key: pwd
        title: 압축비밀번호
        tip: 로압축패키지압축 해제 비밀번호
      - key: save_type
        title: 압축후파일여부저장
        tip: ''
    outputList:
      - key: compress_path
        title: 출력압축후압축패키지경로
        tip: ''
  System.uncompress:
    title: 압축 해제
    comment: >-
      를압축파일 @{source_path} 압축 해제지정디렉터리 @{target_path} 아래, 출력압축 해제후파일에서경로
      @{uncompress_path}
    icon: decompress
    helpManual: 를압축파일압축 해제지정경로
    inputList:
      - key: source_path
        title: 압축패키지경로
        tip: 선택하세요또는입력압축패키지경로
      - key: target_path
        title: 목록 압축 해제디렉터리
        tip: 선택또는입력압축 해제후파일 저장 경로
      - key: status_type
        title: 대상 디렉터리가 없을 때
        tip: 선택한 대상 디렉터리가 없으면 생성합니다
      - key: pwd
        title: 압축 해제 비밀번호
        tip: ''
      - key: save_type
        title: 압축 해제 후 파일 보관 여부
        tip: 압축 해제후파일의, 보관
    outputList:
      - key: uncompress_path
        title: 출력압축 해제 후 파일 경로
        tip: ''
  File.file_exist:
    title: IF 파일 존재
    comment: 파일 @{file_path} 여부존재함, 저장된 실행으로아래
    icon: check-file-exists
    helpManual: 파일여부저장된 를결과출력변수
    inputList:
      - key: file_path
        title: 파일 경로
        tip: 입력또는선택파일 경로
      - key: exist_type
        title: 유형
        tip: 선택유형
    outputList: []
  File.file_create:
    title: 생성파일
    comment: 에서지정디렉터리 @{dst_path} 아래생성파일 @{file_name} , 저장생성파일 경로까지 @{new_file_path}
    icon: create-new-file
    helpManual: 에서지정디렉터리아래생성파일
    inputList:
      - key: dst_path
        title: 지정디렉터리
        tip: 입력또는선택지정폴더디렉터리
      - key: file_name
        title: 파일이름
        tip: 입력파일이름이름
      - key: exist_options
        title: 파일존재함시
        tip: >-
          선택생성파일완료존재함시의;완료본:를에서파일이름후증가추가숫자식별자, 예a(1).txt, 결과가본파일존재함, 이면숫자증가;덮어쓰기:삭제완료존재함파일다시 생성;건너뛰기:반환현재완료존재함파일 경로
    outputList:
      - key: new_file_path
        title: 생성파일 경로
        tip: '출력생성파일 경로, 저장까지변수중, 데이터 유형: 문자열'
  File.file_delete:
    title: 삭제파일
    comment: 삭제파일 @{file_path} , 를결과출력변수 @{delete_file_result}
    icon: delete-file
    helpManual: 삭제지정파일, 를실행 결과출력변수
    inputList:
      - key: file_path
        title: 대기삭제파일
        tip: 선택또는입력대기삭제파일 경로
      - key: delete_options
        title: 삭제
        tip: 선택를파일삭제또는입력돌아가기
    outputList:
      - key: delete_file_result
        title: 출력삭제결과
        tip: '를파일삭제결과저장변수, 데이터 유형: 불리언 값'
  File.file_copy:
    title: 복사파일
    comment: 복사파일 @{file_path} 까지지정디렉터리 @{target_path} 아래, 저장복사후의파일 경로 @{copy_file_path}
    icon: copy-file
    helpManual: 복사목록파일까지지정디렉터리
    inputList:
      - key: file_path
        title: 대기복사파일
        tip: 선택또는입력대기복사파일 경로
      - key: target_path
        title: 지정디렉터리
        tip: 선택또는입력목록 디렉터리
      - key: state_type
        title: 디렉터리가 없을 때
        tip: 지정한 디렉터리가 없을 때 실행할 동작
      - key: file_name
        title: 복사후파일이름
        tip: 지정복사후파일이름, 필요하지 않습니다입력파일이름, 비워 두면사용기존파일이름
      - key: copy_options
        title: 파일존재함시
        tip: >-
          선택지정디렉터리아래파일완료존재함시의; 완료본:를에서파일이름후증가추가숫자식별자, 예a(1).txt, 결과가본파일존재함, 이면숫자증가;
          덮어쓰기:삭제완료존재함파일다시 생성; 건너뛰기:반환현재완료존재함파일 경로
    outputList:
      - key: copy_file_path
        title: 복사후파일 경로
        tip: '출력복사후파일 경로, 저장변수, 데이터 유형: 문자열'
  File.file_write:
    title: 파일 쓰기
    comment: 내용을 파일에 쓰고 저장된 파일 경로를 반환합니다.
    icon: write-file
    helpManual: 지정한 파일에 텍스트를 쓰고 파일 경로를 출력합니다.
    inputList:
      - key: file_path
        title: 파일 경로
        tip: 파일 경로를 선택하거나 입력하세요. 지원 파일 유형 - ".txt", ".docx", ".md", ".py", ".json", ".csv"
      - key: file_option
        title: 파일이 없을 때
        tip: 선택한 파일이 없을 때 실행할 동작
      - key: msg
        title: 쓸 내용
        tip: 파일에 쓸 내용을 입력합니다.
      - key: write_type
        title: 쓰기 방식
        tip: 기존 내용을 덮어쓸지 끝에 이어 쓸지 선택합니다.
      - key: encode_type
        title: 인코딩
        tip: 파일에 사용할 문자 인코딩을 선택합니다. 기본값은 대상 파일의 인코딩을 자동으로 사용합니다.
    outputList:
      - key: write_file_path
        title: 저장된 파일 경로
        tip: 쓰기 완료 후 파일 경로를 저장합니다.
  File.get_file_encoding_type:
    title: 파일 인코딩 가져오기
    comment: 파일 @{file_path}의 인코딩 유형을 가져와 @{file_encoding_type}에 저장합니다.
    icon: get-file-encoding
    helpManual: 파일의 문자 인코딩을 감지해 출력 변수에 저장합니다.
    inputList:
      - key: file_path
        title: 파일 경로
        tip: 인코딩을 확인할 파일 경로를 선택하거나 입력합니다.
    outputList:
      - key: file_encoding_type
        title: 파일 인코딩
        tip: 감지한 파일 인코딩을 문자열로 반환합니다.
  File.file_read:
    title: 파일 읽기
    comment: '@{read_type} 방식으로 파일 @{file_path}의 내용을 읽고 변수 @{read_file_content}에 저장합니다.'
    icon: read-file
    helpManual: 지정한 파일의 내용을 읽어 변수에 저장합니다.
    inputList:
      - key: file_path
        title: 파일 경로
        tip: >-
          읽을 파일 경로를 선택하거나 입력합니다. 지원 파일 유형: ".txt",  ".docx",  ".md",  ".py",  ".json",
          ".csv"
      - key: read_type
        title: 읽기 방식
        tip: 전체 내용, 행 목록, 바이트 중 파일을 읽을 방식을 선택합니다.
      - key: encode_type
        title: 인코딩
        tip: 파일을 읽을 때 사용할 문자 인코딩을 선택합니다. 기본값은 대상 파일의 인코딩을 자동으로 사용합니다.
    outputList:
      - key: read_file_content
        title: 읽은 내용
        tip: 읽은 파일 내용을 저장합니다.
  File.file_move:
    title: 파일
    comment: 를파일 @{file_path} 지정디렉터리 @{target_folder} 아래, 저장후의파일 경로 @{move_file_path}
    icon: move-file
    helpManual: 를지정파일까지목록 디렉터리, 출력후의파일 경로변수
    inputList:
      - key: file_path
        title: 대기파일 경로
        tip: 선택또는입력대기파일 경로
      - key: target_folder
        title: 지정디렉터리
        tip: 대상 디렉터리를 선택하거나 입력하세요. 지정한 디렉터리가 없으면 생성합니다.
      - key: state_type
        title: 디렉터리가 없을 때
        tip: 지정한 디렉터리가 없을 때 실행할 동작
      - key: file_name
        title: 후파일이름
        tip: 입력후파일이름(아니오필요후이름), 비워 두면사용기존파일이름
      - key: exist_options
        title: 파일존재함시
        tip: 선택파일존재함시실행의(덮어쓰기, 건너뛰기, 완료본)
    outputList:
      - key: move_file_path
        title: 후파일 경로
        tip: '출력후파일 경로변수, 데이터 유형: 문자열'
  File.file_rename:
    title: 이름 변경파일
    comment: 를파일 @{file_path} 이름 변경로 @{new_name} 저장이름 변경후의파일 경로 @{rename_file_path}
    icon: rename-file
    helpManual: 를지정파일이름 변경, 출력이름 변경후의파일 경로변수
    inputList:
      - key: file_path
        title: 대기이름 변경파일 경로
        tip: 선택또는입력대기이름 변경파일 경로
      - key: new_name
        title: 새파일이름
        tip: 입력새파일이름(아니오필요후이름)
      - key: exist_options
        title: 파일존재함시
        tip: 선택파일존재함시실행의(덮어쓰기, 건너뛰기, 완료본)
    outputList:
      - key: rename_file_path
        title: 이름 변경후파일 경로
        tip: '출력이름 변경후파일 경로변수, 데이터 유형: 문자열'
  File.file_search:
    title: 조회파일
    comment: >-
      에서 @{folder_path} 디렉터리중조회파일이름패키지 @{search_pattern} 의파일, 저장매칭파일 경로변수
      @{find_file_result}
    icon: find-file
    helpManual: 에서지정디렉터리중조회파일이름패키지지정내용의파일, 출력파일목록변수
    inputList:
      - key: folder_path
        title: 대기조회파일에서디렉터리
        tip: 선택또는입력대기조회파일에서디렉터리
      - key: find_type
        title: 조회방식
        tip: 조회 방식을 지정하세요. 파일명 매칭, 파일명 분할 매칭, 정규식 테이블 방식 매칭을 지원합니다.
      - key: search_pattern
        title: 조회파일이름
        tip: 입력조회내용
      - key: traverse_subfolder
        title: 폴더
        tip: 선택여부폴더
    outputList:
      - key: find_file_result
        title: 저장조회결과
        tip: '출력매칭파일 경로목록, 저장까지변수, 데이터 유형: 목록'
  File.file_wait_status:
    title: 파일 상태 대기
    comment: 파일 @{file_path}가 @{status_type} 상태가 될 때까지 기다리고 결과를 @{wait_file_result}에 저장합니다.
    icon: wait-file
    helpManual: 파일이 생성되거나 삭제될 때까지 기다린 뒤 결과를 반환합니다.
    inputList:
      - key: file_path
        title: 파일 경로
        tip: 상태를 기다릴 파일 경로를 선택하거나 입력합니다.
      - key: status_type
        title: 대기 상태
        tip: 파일 생성 또는 삭제 중 기다릴 상태를 선택합니다.
      - key: wait_time
        title: 제한 시간(초)
        tip: 파일 상태를 기다릴 제한 시간을 초 단위로 입력합니다.
    outputList:
      - key: wait_file_result
        title: 대기 결과
        tip: 지정한 상태가 되면 true, 제한 시간이 지나면 false를 반환합니다.
  File.file_info:
    title: 파일 정보 가져오기
