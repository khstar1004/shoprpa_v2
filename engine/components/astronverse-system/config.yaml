    comment: 화면 잠금 해제는 Windows 보안 정책상 자동 실행을 지원하지 않으며 @{screen_unlock_result}에 false를 반환합니다.
    icon: screen-unlock
    helpManual: 보안 데스크톱의 잠금 해제는 일반 자동화 프로세스에서 수행할 수 없어 false를 반환합니다.
    inputList:
      - key: user_name
        title: 사용자명
        tip: 호환성을 위해 유지되는 입력입니다.
      - key: pwd_type
        title: 인증 유형
        tip: 호환성을 위해 유지되는 입력입니다.
      - key: password_text
        title: 비밀번호
        tip: 호환성을 위해 유지되는 입력입니다.
      - key: password_rsa
        title: 키
        tip: 호환성을 위해 유지되는 입력입니다.
    outputList:
      - key: screen_unlock_result
        title: 실행 결과
        tip: 자동 잠금 해제가 지원되지 않아 false를 저장합니다.
  System.printer:
    title: 프린터인쇄
    comment: >-
      사용프린터 @{printer_name} 인쇄지정파일 @{file_path||folder_path} , 실행 결과출력변수
      @{printer_status}
    icon: printer-print
    helpManual: 연결지정프린터행문서인쇄
    inputList:
      - key: file_type
        title: 인쇄객체
        tip: 지정인쇄객체, 지원인쇄Word, Excel, PDF및이미지파일, 또는량인쇄폴더중국어파일
      - key: doc_app_type
        title: Word문서사용
        tip: Word 열기문서선택의사용
      - key: xls_app_type
        title: Excel문서사용
        tip: Excel 열기문서선택의사용
      - key: batch_print
        title: 인쇄방식
        tip: 인쇄방식, 량인쇄지원폴더아래의파일, 지원하지 않음폴더아래폴더의파일
      - key: file_path
        title: 대기인쇄파일 경로
        tip: 선택또는입력대기인쇄파일 경로
      - key: folder_path
        title: 대기인쇄파일 디렉터리
        tip: 인쇄할 파일 또는 폴더 경로를 선택하거나 입력합니다. 폴더를 선택하면 해당 폴더의 지원 파일을 인쇄합니다.
      - key: printer_type
        title: 인쇄
        tip: 인쇄닫기매개변수
      - key: printer_name
        title: 프린터이름
        tip: 입력프린터이름, 비워 두면시사용프린터
      - key: paper_size
        title: 
        tip: 지정인쇄
      - key: page_weight
        title: 너비정도
        tip: 입력인쇄너비정도
      - key: page_height
        title: 높이정도
        tip: 입력인쇄높이정도
      - key: print_num
        title: 인쇄데이터
        tip: 입력인쇄데이터, 1
      - key: orientation_type
        title: 인쇄버전방식
        tip: 선택인쇄버전방식, 가로/세로
      - key: scale
        title: (%)
        tip: 100%, 입력
      - key: margin_type
        title: 가장자리거리(단일위치)
        tip: ''
      - key: left_margin
        title: 왼쪽가장자리거리
        tip: ''
      - key: top_margin
        title: 위가장자리거리
        tip: ''
      - key: right_margin
        title: 오른쪽가장자리거리
        tip: ''
      - key: bottom_margin
        title: 아래가장자리거리
        tip: ''
      - key: page
        title: 코드
        tip: 예시 - 1,3-5는 1쪽과 3-5쪽을 인쇄합니다. 비워 두면 전체를 인쇄합니다.
    outputList:
      - key: printer_status
        title: 인쇄결과
        tip: '저장인쇄결과까지출력변수, 데이터 유형: 불리언 값'
