atomic:
  System.copy_clip:
    title: 클립보드에 복사
    comment: 를 @{content_type}  @{message||file_path||folder_path} 클립보드에 복사
    icon: copy-to-clipboard
    helpManual: 지원를텍스트내용/파일/폴더클립보드에 복사
    inputList:
      - key: content_type
        title: 복사유형
        tip: 선택복사까지의내용유형
      - key: message
        title: 대기복사의텍스트내용
        tip: 입력텍스트내용
      - key: file_path
        title: 대기복사의파일 경로
        tip: 입력또는선택대기복사파일
      - key: folder_path
        title: 대기복사의폴더 경로
        tip: 입력또는선택대기복사폴더
    outputList: []
  System.clear_clip:
    title: 빈잘라내기
    comment: 빈잘라내기중의내용
    icon: clear-clipboard
    helpManual: 빈잘라내기중의내용
    inputList: []
    outputList: []
  System.paste_clip:
    title: 가져오기잘라내기
    comment: 가져오기잘라내기중의 @{content_type} , 저장변수 @{output_content}
    icon: get-clipboard
    helpManual: 지원가져오기잘라내기중의텍스트내용/파일/폴더, 를텍스트내용/파일폴더저장경로저장까지지정경로중
    inputList:
      - key: content_type
        title: 가져오기유형
        tip: 선택잘라내기중가져올의내용유형
      - key: dst_path
        title: 저장경로
        tip: 입력하세요또는선택저장경로
      - key: state_type
        title: 저장경로찾을 수 없습니다시
        tip: 저장경로찾을 수 없습니다시실행의
      - key: dst_file_name
        title: 파일저장이름
        tip: 입력저장의파일이름, 아니오필요추가파일후, 비어 있습니다사용기존파일이름
      - key: dst_folder_name
        title: 폴더저장이름
        tip: 입력저장의폴더이름, 비어 있습니다사용기존폴더이름
    outputList:
      - key: output_content
        title: 출력잘라내기내용변수
        tip: 가져오기텍스트내용출력로텍스트변수, 가져오기파일/폴더출력로경로정보
  System.compress:
    title: 압축
    comment: 압축 @{file_type} 까지지정디렉터리 @{compress_dir} 중, 저장압축패키지경로  @{compress_path}
    icon: compress
    helpManual: 압축선택파일및폴더까지지정디렉터리, 지원단일개또는다중개파일폴더시압축로일개압축패키지(압축후파일형식로zip형식)
    inputList:
      - key: file_type
        title: 선택압축방식
        tip: 선택압축파일/폴더/파일및폴더
      - key: file_path
        title: 대기압축파일
        tip: 선택또는입력대기압축파일 경로
      - key: folder_path
        title: 대기압축폴더
        tip: 선택또는입력대기압축폴더 경로
      - key: compress_dir
        title: 목록경로
        tip: 저장목록 압축파일 경로
      - key: state_type
        title: 목록경로찾을 수 없습니다시
        tip: 선택목록경로찾을 수 없습니다시실행의
      - key: compress_name
        title: 압축패키지이름
        tip: 지정압축패키지이름, 비어 있습니다이면으로압축목록중일개압축파일이름명령이름
      - key: pwd
        title: 압축비밀번호
        tip: 로압축패키지압축 해제비밀번호
      - key: save_type
        title: 압축후파일여부저장
        tip: ''
    outputList:
      - key: compress_path
        title: 출력압축후압축패키지경로
        tip: ''
  System.uncompress:
    title: 압축 해제
    comment: >-
      를압축파일 @{source_path} 압축 해제지정디렉터리 @{target_path} 아래, 출력압축 해제후파일에서경로
      @{uncompress_path}
    icon: decompress
    helpManual: 를압축파일압축 해제지정경로
    inputList:
      - key: source_path
        title: 압축패키지경로
        tip: 선택하세요또는입력압축패키지경로
      - key: target_path
        title: 목록 압축 해제디렉터리
        tip: 선택또는입력압축 해제후파일저장경로
      - key: status_type
        title: 목록 디렉터리찾을 수 없습니다시
        tip: 선택목록 디렉터리찾을 수 없습니다시실행의, 직선연결생성
      - key: pwd
        title: 압축 해제비밀번호
        tip: ''
      - key: save_type
        title: 압축 해제후파일여부보관
        tip: 압축 해제후파일의, 보관
    outputList:
      - key: uncompress_path
        title: 출력압축 해제후파일 경로
        tip: ''
  File.file_exist:
    title: IF파일존재함
    comment: 파일 @{file_path} 여부존재함, 저장된 실행으로아래
    icon: check-file-exists
    helpManual: 파일여부저장된 를결과출력변수
    inputList:
      - key: file_path
        title: 파일 경로
        tip: 입력또는선택파일 경로
      - key: exist_type
        title: 유형
        tip: 선택유형
    outputList: []
  File.file_create:
    title: 생성파일
    comment: 에서지정디렉터리 @{dst_path} 아래생성파일 @{file_name} , 저장생성파일 경로까지 @{new_file_path}
    icon: create-new-file
    helpManual: 에서지정디렉터리아래생성파일
    inputList:
      - key: dst_path
        title: 지정디렉터리
        tip: 입력또는선택지정폴더디렉터리
      - key: file_name
        title: 파일이름
        tip: 입력파일이름이름
      - key: exist_options
        title: 파일존재함시
        tip: >-
          선택생성파일완료존재함시의;완료본:를에서파일이름후증가추가숫자식별자, 예a(1).txt, 결과가본파일존재함, 이면숫자증가;덮어쓰기:삭제완료존재함파일다시 생성;건너뛰기:반환현재완료존재함파일 경로
    outputList:
      - key: new_file_path
        title: 생성파일 경로
        tip: 출력생성파일 경로, 저장까지변수중, 데이터 유형로문자열
  File.file_delete:
    title: 삭제파일
    comment: 삭제파일 @{file_path} , 를결과출력변수 @{delete_file_result}
    icon: delete-file
    helpManual: 삭제지정파일, 를실행 결과출력변수
    inputList:
      - key: file_path
        title: 대기삭제파일
        tip: 선택또는입력대기삭제파일 경로
      - key: delete_options
        title: 삭제
        tip: 선택를파일삭제또는입력돌아가기
    outputList:
      - key: delete_file_result
        title: 출력삭제결과
        tip: 를파일삭제결과저장변수, 데이터 유형로불리언
  File.file_copy:
    title: 복사파일
    comment: 복사파일 @{file_path} 까지지정디렉터리 @{target_path} 아래, 저장복사후의파일 경로 @{copy_file_path}
    icon: copy-file
    helpManual: 복사목록파일까지지정디렉터리
    inputList:
      - key: file_path
        title: 대기복사파일
        tip: 선택또는입력대기복사파일 경로
      - key: target_path
        title: 지정디렉터리
        tip: 선택또는입력목록 디렉터리
      - key: state_type
        title: 디렉터리찾을 수 없습니다시
        tip: 지정디렉터리찾을 수 없습니다시실행의
      - key: file_name
        title: 복사후파일이름
        tip: 지정복사후파일이름, 필요하지 않습니다입력파일이름, 비어 있습니다사용기존파일이름
      - key: copy_options
        title: 파일존재함시
        tip: >-
          선택지정디렉터리아래파일완료존재함시의; 완료본:를에서파일이름후증가추가숫자식별자, 예a(1).txt, 결과가본파일존재함, 이면숫자증가;
          덮어쓰기:삭제완료존재함파일다시 생성; 건너뛰기:반환현재완료존재함파일 경로
    outputList:
      - key: copy_file_path
        title: 복사후파일 경로
        tip: 출력복사후파일 경로, 저장변수, 데이터 유형로문자열
  File.file_write:
    title: 입력파일
    comment: 입력내용 @{msg} 까지파일 @{file_path} 중, 저장입력후의파일 경로 @{write_file_path}
    icon: write-file
    helpManual: 지정파일중입력내용, 출력입력후의파일 경로변수
    inputList:
      - key: file_path
        title: 파일 경로
        tip: 선택또는입력파일 경로, 지원입력의파일유형있음: ".txt",  ".docx",  ".md",  ".py",  ".json",  ".csv"
      - key: file_option
        title: 파일찾을 수 없습니다시
        tip: 선택파일찾을 수 없습니다시실행의
      - key: msg
        title: 입력내용
        tip: 입력입력할의내용
      - key: write_type
        title: 입력방식
        tip: 지정입력방식
      - key: encode_type
        title: 코드방식
        tip: 선택입력내용의코드방식, 파일내용비어 있습니다시필요지정, 선택시사용대기입력파일의코드방식
    outputList:
      - key: write_file_path
        title: 파일 경로
        tip: 출력입력후파일 경로변수, 데이터 유형로문자열
  File.get_file_encoding_type:
    title: 가져오기파일코드유형
    comment: 가져오기파일 @{file_path} 의코드유형저장변수 @{file_encoding_type}
    icon: get-file-encoding
    helpManual: 가져오기 지정파일의코드유형, 출력코드유형변수
    inputList:
      - key: file_path
        title: 파일 경로
        tip: 선택또는입력대기가져오기 코드유형의파일 경로
    outputList:
      - key: file_encoding_type
        title: 파일코드유형
        tip: 출력파일코드유형변수, 데이터 유형로문자열
  File.file_read:
    title: 가져오기파일
    comment:  @{read_type} 방식가져오기파일 @{file_path} 중의내용, 저장변수 @{read_file_content}
    icon: read-file
    helpManual: 가져오기 지정파일내용, 를가져오기내용출력저장변수
    inputList:
      - key: file_path
        title: 대기가져오기파일 경로
        tip: >-
          선택또는입력대기가져오기파일 경로,  지요소가져오기의파일유형있음: ".txt",  ".docx",  ".md",  ".py",  ".json", 
          ".csv"
      - key: read_type
        title: 가져오기방식
        tip: 선택가져오기방식, 전체가져오기:가져오기전체내용; 행가져오기:행가져오기텍스트내용; 이제어:으로이제어방식가져오기파일내용
      - key: encode_type
        title: 코드방식
        tip: 선택가져오기내용의코드방식, 선택시사용대기가져오기파일의코드방식
    outputList:
      - key: read_file_content
        title: 가져오기내용로
        tip: 출력가져오기내용변수, 데이터 유형로문자열
  File.file_move:
    title: 파일
    comment: 를파일 @{file_path} 지정디렉터리 @{target_folder} 아래, 저장후의파일 경로 @{move_file_path}
    icon: move-file
    helpManual: 를지정파일까지목록 디렉터리, 출력후의파일 경로변수
    inputList:
      - key: file_path
        title: 대기파일 경로
        tip: 선택또는입력대기파일 경로
      - key: target_folder
        title: 지정디렉터리
        tip: 선택또는입력목록 디렉터리,  지정디렉터리찾을 수 없습니다시생성
      - key: state_type
        title: 디렉터리찾을 수 없습니다시
        tip: 지정디렉터리찾을 수 없습니다시실행의
      - key: file_name
        title: 후파일이름
        tip: 입력후파일이름(아니오필요후이름), 비어 있습니다사용기존파일이름
      - key: exist_options
        title: 파일존재함시
        tip: 선택파일존재함시실행의(덮어쓰기, 건너뛰기, 완료본)
    outputList:
      - key: move_file_path
        title: 후파일 경로
        tip: 출력후파일 경로변수, 데이터 유형로문자열
  File.file_rename:
    title: 이름 변경파일
    comment: 를파일 @{file_path} 이름 변경로 @{new_name} 저장이름 변경후의파일 경로 @{rename_file_path}
    icon: rename-file
    helpManual: 를지정파일이름 변경, 출력이름 변경후의파일 경로변수
    inputList:
      - key: file_path
        title: 대기이름 변경파일 경로
        tip: 선택또는입력대기이름 변경파일 경로
      - key: new_name
        title: 새파일이름
        tip: 입력새파일이름(아니오필요후이름)
      - key: exist_options
        title: 파일존재함시
        tip: 선택파일존재함시실행의(덮어쓰기, 건너뛰기, 완료본)
    outputList:
      - key: rename_file_path
        title: 이름 변경후파일 경로
        tip: 출력이름 변경후파일 경로변수, 데이터 유형로문자열
  File.file_search:
    title: 조회파일
    comment: >-
      에서 @{folder_path} 디렉터리중조회파일이름패키지 @{search_pattern} 의파일, 저장매칭파일 경로변수
      @{find_file_result}
    icon: find-file
    helpManual: 에서지정디렉터리중조회파일이름패키지지정내용의파일, 출력파일목록변수
    inputList:
      - key: folder_path
        title: 대기조회파일에서디렉터리
        tip: 선택또는입력대기조회파일에서디렉터리
      - key: find_type
        title: 조회방식
        tip: 지정조회방식: 매칭입력할파일이름;매칭입력모듈분파일이름, 필요분크기;정상이면테이블방식매칭입력정상이면테이블방식
      - key: search_pattern
        title: 조회파일이름
        tip: 입력조회내용
      - key: traverse_subfolder
        title: 폴더
        tip: 선택여부폴더
    outputList:
      - key: find_file_result
        title: 저장조회결과
        tip: 출력매칭파일 경로목록, 저장까지변수, 데이터 유형로목록
  File.file_wait_status:
    title: 대기파일
    comment: 대기파일 @{file_path} 상태로 @{status_type} 시실행다음 단계, 저장대기결과까지 @{wait_file_result}
    icon: wait-file
    helpManual: 대기파일상태로지정상태시실행다음 단계, 출력대기결과변수
    inputList:
      - key: file_path
        title: 파일 경로
        tip: 선택또는입력파일 경로
      - key: status_type
        title: 대기상태
        tip: 선택대기파일의상태
      - key: wait_time
        title: 시간 초과시간
