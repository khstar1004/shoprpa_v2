  RecruitAI.rating_resume:
    title: 이력서 평가
    comment: 직무 요건과 이력서 내용을 비교해 평가 결과를 생성합니다.
    icon: resume-scoring
    helpManual: ''
    inputList:
    - key: job_name
      title: 직무명
      tip: 채용 포지션 또는 직무명을 입력합니다.
    - key: resume_input_type
      title: 이력서 입력 방식
      tip: 이력서를 파일로 입력할지 텍스트로 입력할지 선택합니다.
