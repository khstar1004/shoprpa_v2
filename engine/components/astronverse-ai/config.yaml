      title: 평가 기준
      tip: 기본 평가 기준을 사용할지 직접 지정할지 선택합니다.
    - key: rating_dimensions
      title: 평가 항목
      tip: 직접 사용할 평가 항목을 입력합니다.
    - key: model
      title: 모델
      tip: 사용할 AI 모델을 선택합니다.
    outputList:
    - key: recruit_rating
      title: 이력서 평가 결과
      tip: 이력서 평가 결과를 저장합니다.
      subTitle: AI 완료
