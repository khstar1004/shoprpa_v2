atomic:
  Agent.call_dify:
    title: Dify 워크플로 호출
    comment: Dify workflow API를 호출하고 실행 결과를 반환합니다.
    icon: call-dify-workflow
    helpManual: ''
    inputList:
    - key: user
      title: 사용자명
      tip: API 호출에 사용할 사용자명을 입력합니다.
    - key: app_token
      title: Dify API Key
      tip: Dify 애플리케이션 API Key를 입력합니다.
    - key: app_url
      title: Dify API 주소
      tip: Dify API 기본 주소를 입력합니다.
    - key: file_flag
      title: 파일 업로드 여부
      tip: 요청에 파일을 함께 업로드할지 선택합니다.
    - key: variable_name
      title: 변수 이름
      tip: 워크플로 입력 변수 이름을 입력합니다.
    - key: variable_value
      title: 변수 값
      tip: 워크플로 입력 변수 값을 입력합니다.
    - key: file_path
      title: 파일 경로
      tip: 업로드하거나 분석할 파일을 선택합니다.
    - key: file_type
      title: 파일 유형
      tip: 업로드 파일의 유형을 선택합니다.
    outputList:
    - key: dify_result
      title: Dify 실행 결과
      tip: Dify 호출 결과를 저장합니다.
      subTitle: AI 완료
  Agent.call_dify_chatflow:
    title: Dify 채팅 플로우 호출
    comment: Dify chatflow API를 호출하고 대화 결과를 반환합니다.
    icon: call-dify-workflow
    helpManual: ''
    inputList:
    - key: user
      title: 사용자명
      tip: API 호출에 사용할 사용자명을 입력합니다.
    - key: app_token
      title: Dify API Key
      tip: Dify 애플리케이션 API Key를 입력합니다.
    - key: app_url
      title: Dify API 주소
      tip: Dify API 기본 주소를 입력합니다.
    - key: query
      title: 사용자 입력
      tip: AI에 전달할 사용자 입력을 작성합니다.
    - key: file_flag
      title: 파일 업로드 여부
      tip: 요청에 파일을 함께 업로드할지 선택합니다.
    - key: variable_name
      title: 변수 이름
      tip: 워크플로 입력 변수 이름을 입력합니다.
    - key: variable_value
      title: 변수 값
      tip: 워크플로 입력 변수 값을 입력합니다.
    - key: file_path
      title: 파일 경로
      tip: 업로드하거나 분석할 파일을 선택합니다.
    - key: file_type
      title: 파일 유형
      tip: 업로드 파일의 유형을 선택합니다.
    outputList:
    - key: dify_result
      title: Dify 실행 결과
      tip: Dify 호출 결과를 저장합니다.
      subTitle: AI 완료
  Agent.call_xcagent:
    title: ShopRPA Agent 워크플로 호출
    comment: ShopRPA Agent 워크플로를 호출하고 실행 결과를 반환합니다.
    icon: call-dify-workflow
    helpManual: ''
    inputList:
    - key: api_key
      title: API Key
      tip: ''
    - key: api_secret
      title: API Secret
      tip: ''
    - key: flow_id
      title: 워크플로 ID
      tip: 호출할 워크플로 ID를 입력합니다.
    - key: input_value
      title: 입력 값
      tip: 워크플로에 전달할 기본 입력 값을 입력합니다.
    - key: file_flag
      title: 파일 업로드 여부
      tip: 요청에 파일을 함께 업로드할지 선택합니다.
    - key: variable_name
      title: 변수 이름
      tip: 워크플로 입력 변수 이름을 입력합니다.
    - key: variable_value
      title: 변수 값
      tip: 워크플로 입력 변수 값을 입력합니다.
    - key: file_path
      title: 파일 경로
      tip: 업로드하거나 분석할 파일을 선택합니다.
    outputList:
    - key: xcagent_result
      title: Agent 실행 결과
      tip: ShopRPA Agent 호출 결과를 저장합니다.
      subTitle: AI 완료
  Agent.call_astron_agent:
    title: ShopRPA Agent 선택 실행
    comment: 선택한 ShopRPA Agent 워크플로를 실행합니다.
    icon: call-dify-workflow
    helpManual: ''
    inputList:
    - key: astron_workflow
      title: ShopRPA Agent 워크플로
      tip: 실행할 ShopRPA Agent 워크플로를 선택합니다.
    outputList:
    - key: astron_agent_result
      title: Agent 실행 결과
      tip: 선택한 Agent 워크플로 실행 결과를 저장합니다.
      subTitle: AI 완료
  ChatAI.single_turn_chat:
    title: 단일 AI 채팅
    comment: 입력한 질문에 대해 AI 응답을 한 번 생성합니다.
    icon: single-chat
    helpManual: ''
    inputList:
    - key: query
      title: 사용자 입력
      tip: AI에 전달할 사용자 입력을 작성합니다.
    - key: model
      title: 모델
      tip: 사용할 AI 모델을 선택합니다.
    - key: custom_model
      title: 사용자 지정 모델 ID
      tip: 목록에 없는 모델 ID를 직접 입력합니다.
    outputList:
    - key: single_chat_res
      title: AI 응답
      tip: AI가 생성한 응답을 저장합니다.
      subTitle: AI 완료
  ChatAI.chat:
    title: 다중 AI 채팅
    comment: 다중 턴 채팅 창을 열고 대화 결과를 반환합니다.
    icon: multi-chat
    helpManual: ''
    inputList:
    - key: is_save
      title: 대화 저장
      tip: 대화 결과를 저장할지 선택합니다.
    - key: title
      title: 대화 제목
      tip: 대화 창과 저장 기록에 사용할 제목을 입력합니다.
    - key: max_turns
      title: 최대 대화 턴 수
      tip: 허용할 최대 질문/응답 턴 수를 입력합니다.
    - key: model
      title: 모델
      tip: 사용할 AI 모델을 선택합니다.
    - key: custom_model
      title: 사용자 지정 모델 ID
      tip: 목록에 없는 모델 ID를 직접 입력합니다.
    outputList:
    - key: chat_res
      title: 대화 결과
      tip: 다중 턴 대화 결과를 저장합니다.
      subTitle: AI 완료
  ChatAI.knowledge_chat:
    title: 문서 기반 채팅
    comment: 파일 내용을 읽어 지식 기반 채팅을 시작합니다.
    icon: knowledge-qa
    helpManual: ''
    inputList:
    - key: file_path
      title: 파일 경로
      tip: 업로드하거나 분석할 파일을 선택합니다.
    - key: is_save
      title: 대화 저장
      tip: 대화 결과를 저장할지 선택합니다.
    - key: max_turns
      title: 최대 대화 턴 수
      tip: 허용할 최대 질문/응답 턴 수를 입력합니다.
    outputList:
    - key: knowledge_chat_res
      title: 문서 채팅 결과
      tip: 문서 기반 채팅 결과를 저장합니다.
      subTitle: AI 완료
  ContractAI.get_factors:
    title: 계약 항목 추출
    comment: 계약서 파일 또는 텍스트에서 지정한 항목을 추출합니다.
    icon: contract-element-extraction
    helpManual: ''
    inputList:
    - key: contract_type
      title: 입력 방식
      tip: 계약서를 파일로 입력할지 텍스트로 입력할지 선택합니다.
    - key: contract_path
      title: 계약서 파일
      tip: 분석할 계약서 파일을 선택합니다.
    - key: contract_content
      title: 계약서 내용
      tip: 분석할 계약서 텍스트를 입력합니다.
    - key: custom_factors
      title: 추출 항목
      tip: 계약서에서 추출할 항목을 선택하거나 추가합니다.
    - key: contract_validate
      title: 추출 항목 검증
      tip: 추출 항목 구성이 올바른지 확인합니다.
    - key: model
      title: 모델
      tip: 사용할 AI 모델을 선택합니다.
    outputList:
    - key: factor_result
      title: 추출 결과
      tip: 계약서 항목 추출 결과를 저장합니다.
      subTitle: AI 완료
  DocumentAI.theme_expand:
