
spring:
#  autoconfigure:
#    exclude:
#      - com.iflytek.sec.uap.starter.UapClientAutoConfiguration
  servlet:
    multipart:
      max-request-size: 110MB
      max-file-size: 100MB
      file-size-threshold: 100MB
  redis:
    database: ${REDIS_DB}
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}
    pool:
      max-active: 200
      max-idle: 10
      max-wait: -1
      min-idle: 0
    timeout: 5000
  session:
    store-type: redis
    redis:
      flush-mode: on_save    # 매결과까지 Redis
      namespace: uap:session # key 전, 

  datasource:
    # RPA 서비스데이터베이스(데이터)
    url: jdbc:mysql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}?serverTimezone=GMT%2B8&zeroDateTimeBehavior=round&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowMultiQueries=true
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driverClassName: com.mysql.cj.jdbc.Driver
    platform: mysql
    type: com.alibaba.druid.pool.DruidDataSource
    initialSize: 1
    minIdle: 3
    maxActive: 20
    maxWait: 60000
    timeBetweenEvictionRunsMillis: 60000
    minEvictableIdleTimeMillis: 30000
    validationQuery: select 'x'
    testWhileIdle: true
    testOnBorrow: false
    testOnReturn: false
    poolPreparedStatements: true
    maxPoolPreparedStatementPerConnectionSize: 20
    filters: stat,wall,slf4j
    connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=2000;druid.stat.logSlowSql=true;druid.stat.enabled=true
    # Casdoor 데이터베이스(데이터)
    casdoor:
      url: jdbc:mysql://${CASDOOR_DATABASE_HOST}:${CASDOOR_DATABASE_PORT}/casdoor?serverTimezone=GMT%2B8&zeroDateTimeBehavior=round&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowMultiQueries=true
      username: ${CASDOOR_DATABASE_USERNAME}
      password: ${CASDOOR_DATABASE_PASSWORD}
      driverClassName: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:/mapper/*/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-value: 1
      logic-not-delete-value: 0

druid:
  initParams:
    loginUsername: admin
    loginPassword: 123456
    allows:
    denys:
    resetEnable: false


#로그종료 매칭
logging:
  level:
    org:
      springframework:
        boot:
          autoconfigure: info
  config: classpath:logback-delayed.xml

redis:
  open: "true"


#  허용매칭에서의주소요청 연결
#  전백엔드분시결과가프론트엔드의및백엔드아니요일, 요청를프론트엔드의매칭에서,비고예이름또는ip가능, 아니요필요단말
allowed:
  origins: localhost

# RPA 인증 서비스매칭
rpa:
  auth:
    # 모듈방식: saas | private-enterprise | private-uap | casdoor
    deployment-mode: casdoor

