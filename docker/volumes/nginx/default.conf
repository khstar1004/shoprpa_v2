resolver 127.0.0.11 valid=5s ipv6=off;

# OpenResty Lua module paths.
lua_package_path "/usr/local/openresty/lualib/?.lua;;;/usr/local/openresty/nginx/lua/?.lua;;";

# Shared cache for Lua handlers.
lua_shared_dict my_cache 10m;

# Keep production logs at error level by default.
error_log /usr/local/openresty/nginx/logs/error.log error;

upstream resource-service {
    server resource-service:8030;
    keepalive 32;
}

upstream robot-service {
    server robot-service:8040;
    keepalive 32;
}

upstream ai-service {
    server ai-service:8010;
    keepalive 32;
}

upstream openapi-service {
    server openapi-service:8020;
    keepalive 32;
}

upstream rpa-auth-service {
    server rpa-auth:10251;
    keepalive 32;
}

upstream casdoor {
    server casdoor:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    # nginx가 켜진 상태에서 Docker 컨테이너가 재생성되면 IP가 바뀔 수 있습니다.
    # proxy_pass에 변수를 사용해 Docker DNS를 다시 조회하고, 오래된 업스트림 IP로 인한 502를 막습니다.
    set $resource_service_endpoint resource-service:8030;
    set $robot_service_endpoint robot-service:8040;
    set $ai_service_endpoint ai-service:8010;
    set $openapi_service_endpoint openapi-service:8020;
    set $rpa_auth_service_endpoint rpa-auth:10251;
    set $casdoor_endpoint casdoor:8000;

    # Common proxy settings.
    client_max_body_size 100M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, token, X-Requested-With, Accept-Language" always;
    add_header Access-Control-Expose-Headers "token" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Vary Origin always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # Request context used by the Lua auth handler.
    set $context_type "HTTP";

    # Health probes must not require an application session. Compose already checks
    # the upstream services, and these gateway routes are used by release smoke tests.
    location = /api/rpa-ai-service/health {
        rewrite ^ /health break;
        proxy_pass http://$ai_service_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location = /api/rpa-openapi/health {
        rewrite ^ /health break;
        proxy_pass http://$openapi_service_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location /api/resource/ {
        access_by_lua_file lua/auth_handler.lua;
        
        proxy_pass http://$resource_service_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # Robot service routes. Some robot endpoints perform their own auth checks.
    location /api/robot/ {
        # Re-enable auth_handler here if all robot endpoints need gateway auth.
        # if ($request_uri != "/api/robot/user/info") {
        #     access_by_lua_file lua/auth_handler.lua;
        # }

        proxy_pass http://$robot_service_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/rpa-ai-service/ {
        access_by_lua_file lua/auth_handler.lua;

        rewrite ^/api/rpa-ai-service/(.*)$ /$1 break;
        proxy_pass http://$ai_service_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # MCP endpoint uses API-key authentication and skips gateway user auth.
    location ~ ^/api/rpa-openapi/mcp/?$ {
        # API key is supplied as ?key=xxx.
        # Supported forms:
        # - /api/rpa-openapi/mcp?key=xxx
        # - /api/rpa-openapi/mcp/?key=xxx
        
        rewrite ^/api/rpa-openapi/mcp/?(.*)$ /mcp/$1 break;
        proxy_pass http://$openapi_service_endpoint;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location /api/rpa-openapi/ws {
        set $context_type "WebSocket";
        access_by_lua_file lua/auth_handler.lua;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 60s;

        rewrite ^/api/rpa-openapi/(.*)$ /$1 break;
        proxy_pass http://$openapi_service_endpoint;
    }

    location /api/rpa-openapi/ {
        access_by_lua_file lua/auth_handler.lua;

        rewrite ^/api/rpa-openapi/(.*)$ /$1 break;
        proxy_pass http://$openapi_service_endpoint;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location /api/rpa-auth/ {
        proxy_pass http://$rpa_auth_service_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/casdoor/ {
        rewrite ^/api/casdoor/(.*)$ /$1 break;
        proxy_pass http://$casdoor_endpoint;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # ShopRPA-branded assets used by the authentication screen.
    location /shoprpa-static/ {
        alias /usr/local/openresty/nginx/static/;
        access_log off;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /favicon.ico {
        access_log off;
        return 204;
    }

    location / {
        return 404 "Not Found";
    }
}
