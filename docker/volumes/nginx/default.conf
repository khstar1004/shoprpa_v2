# nginx.conf
resolver 127.0.0.11 valid=5s ipv6=off;

# 모듈로드경로, 확인 OpenResty 가능항목까지 resty.* 모듈
lua_package_path "/usr/local/openresty/lualib/?.lua;;;/usr/local/openresty/nginx/lua/?.lua;;";
# 사용 LuaJIT 메모리공유항목, 사용항목저장항목일항목전체영역매칭항목또는항목저장(예결과필요의항목)
lua_shared_dict my_cache 10m;

# 오류로그단계항목항목로 debug, 으로항목조회항목 Lua 항목본의항목디버그정보
# 에서운영 환경중, 가능으로항목까지 info 또는 warn
error_log /usr/local/openresty/nginx/logs/error.log error; # <-- !!! 디버그닫기항목 !!!

# 위항목서비스서비스지정항목, 보관항목아니오변수
upstream resource-service {
    server resource-service:8030;
    keepalive 32;
}

upstream robot-service {
    server robot-service:8040;
    keepalive 32;
}

upstream ai-service {
    server ai-service:8010;
    keepalive 32;
}

upstream openapi-service {
    server openapi-service:8020;
    keepalive 32;
}

upstream rpa-auth-service {
    server rpa-auth:10251;
    keepalive 32;
}

upstream casdoor {
    server casdoor:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    # nginx가 켜진 상태에서 Docker 컨테이너가 재생성되면 IP가 바뀔 수 있습니다.
    # proxy_pass에 변수를 사용해 Docker DNS를 다시 조회하고, 오래된 업스트림 IP로 인한 502를 막습니다.
    set $resource_service_endpoint resource-service:8030;
    set $robot_service_endpoint robot-service:8040;
    set $ai_service_endpoint ai-service:8010;
    set $openapi_service_endpoint openapi-service:8020;
    set $rpa_auth_service_endpoint rpa-auth:10251;
    set $casdoor_endpoint casdoor:8000;

    # 통신사용매칭항목
    client_max_body_size 100M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, token, X-Requested-With, Accept-Language" always;
    add_header Access-Control-Expose-Headers "token" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Vary Origin always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # 지정항목일개방법항목에서 Lua 항목본중항목현재위아래문서유형의변수
    set $context_type "HTTP";

    # resource-service 경로항목
    location /api/resource/ {
        access_by_lua_file lua/auth_handler.lua; # 호출외부부서 Lua 인증항목본
        
        proxy_pass http://$resource_service_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # robot-service 경로항목
    # 항목아니오항목경로항목행인증, 으로항목인증 서비스항목의항목호출
    # 예결과필요보관항목 robot-service 의항목연결항목(정렬제거 /user/info), 이면필요변경항목의항목정도항목제어
    location /api/robot/ {
        # 예결과필요인증 /api/robot/ 항목연결항목, 항목정렬제거 /user/info
        # if ($request_uri != "/api/robot/user/info") {
        #     access_by_lua_file lua/auth_handler.lua;
        # }

        proxy_pass http://$robot_service_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ai-service 경로항목
    location /api/rpa-ai-service/ {
        access_by_lua_file lua/auth_handler.lua; # 호출외부부서 Lua 인증항목본

        rewrite ^/api/rpa-ai-service/(.*)$ /$1 break;
        proxy_pass http://$ai_service_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # openapi-service 경로항목
    # MCP 항목사용 location - 항목시항목관리항목/아니오항목항목의요청항목
    location ~ ^/api/rpa-openapi/mcp/?$ {
        # MCP 연결항목건너뛰기항목인증, 사용 API Key 인증
        # API Key 에서조회매개변수중항목: ?key=xxx
        # 지원으로아래형식:
        # - /api/rpa-openapi/mcp?key=xxx
        # - /api/rpa-openapi/mcp/?key=xxx
        
        rewrite ^/api/rpa-openapi/mcp/?(.*)$ /mcp/$1 break;
        proxy_pass http://$openapi_service_endpoint;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # WebSocket 항목사용 location
    location /api/rpa-openapi/ws {
        # 로 WebSocket 인증항목위아래문서유형
        set $context_type "WebSocket";
        access_by_lua_file lua/auth_handler.lua; # 호출외부부서 Lua 인증항목본

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade"; # WebSocket 업그레이드필요
        proxy_http_version 1.1;
        proxy_read_timeout 60s;

        rewrite ^/api/rpa-openapi/(.*)$ /$1 break;
        proxy_pass http://$openapi_service_endpoint;
    }

    # 통신사용 API location - 필요항목인증
    location /api/rpa-openapi/ {
        access_by_lua_file lua/auth_handler.lua; # 호출외부부서 Lua 인증항목본

        rewrite ^/api/rpa-openapi/(.*)$ /$1 break;
        proxy_pass http://$openapi_service_endpoint;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # rpa-auth 경로항목
    location /api/rpa-auth/ {
        proxy_pass http://$rpa_auth_service_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # casdoor 경로항목
    location /api/casdoor/ {
        rewrite ^/api/casdoor/(.*)$ /$1 break;
        proxy_pass http://$casdoor_endpoint;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Shoprpa-branded assets used by the authentication screen.
    location /shoprpa-static/ {
        alias /usr/local/openresty/nginx/static/;
        access_log off;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # 항목항목조회
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 항목관리 favicon.ico 요청항목
    location /favicon.ico {
        access_log off;
        return 204;
    }

    # 항목경로항목
    location / {
        return 404 "Not Found";
    }
}
